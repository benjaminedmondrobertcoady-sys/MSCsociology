<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMahjong | EduQuest</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F3E9CF; --parchment-deep:#EBDDB8; --cream:#FAF4E4; --band:#E4D3A6;
    --navy:#1F3A5F; --navy-ink:#16283F; --gold:#C9A227; --gold-deep:#A8841B;
    --green:#3E6B4F; --peri:#5B6ABF; --peri-deep:#3E4A96; --teal:#2E7F87; --violet:#6C4FA1;
    --red:#A63A32; --slate:#5A6E85; --sage:#8FA99B;
    --ui:"Trebuchet MS","Segoe UI",Verdana,sans-serif;
    --prose:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:var(--ui);background:var(--peri-deep);color:var(--navy-ink);display:flex;flex-direction:column;overflow:hidden;}
  body.scholastic,body.scholastic *{font-family:"DotGothic16",monospace !important;}

  header{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:8px 16px;
    background:linear-gradient(105deg,var(--peri-deep),var(--peri) 55%,var(--violet));
    color:#F2EFFF;border-bottom:3px solid var(--gold);}
  header h1{font-size:19px;letter-spacing:.04em;font-weight:700;}
  header h1 .eq{opacity:.75;font-weight:400;font-size:12px;letter-spacing:.18em;text-transform:uppercase;margin-right:10px;}
  header .sub{font-size:12.5px;font-style:italic;font-family:var(--prose);opacity:.9;}
  header .spacer{flex:1;}
  .toggle{font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;
    background:rgba(255,255,255,.12);color:#F2EFFF;border:1px solid rgba(255,255,255,.45);padding:5px 10px;border-radius:3px;}
  .toggle:hover{background:rgba(255,255,255,.25);}

  main{flex:1 1 auto;display:flex;min-height:0;padding:8px;gap:8px;}

  /* ---- level rail ---- */
  .rail{flex:0 0 218px;display:flex;flex-direction:column;background:var(--cream);border-radius:6px;
    border:1px solid rgba(31,58,95,.3);overflow:hidden;}
  .rail-head{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--navy);color:var(--cream);}
  .rail-head .rh-badge{width:26px;height:26px;border-radius:4px;background:var(--gold);color:var(--navy);
    display:flex;align-items:center;justify-content:center;font-family:var(--prose);font-weight:700;font-size:14px;}
  .rail-head .rh-name{flex:1 1 auto;font-size:13px;font-weight:700;}
  .teach{font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;background:rgba(255,255,255,.14);
    color:var(--cream);border:1px solid rgba(255,255,255,.4);padding:3px 6px;border-radius:3px;}
  .teach.on{background:var(--gold);color:var(--navy);border-color:var(--gold);}
  .levels{flex:1 1 auto;overflow-y:auto;padding:8px;}
  .lev{display:flex;gap:8px;align-items:flex-start;width:100%;text-align:left;cursor:pointer;margin-bottom:6px;
    background:var(--parchment);border:1.5px solid rgba(31,58,95,.35);border-radius:5px;padding:8px 9px;
    transition:transform .1s ease,border-color .12s ease,background .12s ease;}
  .lev:hover{transform:translateX(2px);border-color:var(--navy);}
  .lev .lid{flex:0 0 auto;font-family:var(--prose);font-weight:700;font-size:13px;color:var(--navy);min-width:26px;}
  .lev .ltx{flex:1 1 auto;min-width:0;}
  .lev .lname{display:block;font-size:12px;font-weight:700;color:var(--navy);line-height:1.2;}
  .lev .lsub{display:block;font-size:10.5px;font-style:italic;font-family:var(--prose);opacity:.72;margin-top:1px;}
  .lev .lst{flex:0 0 auto;font-size:13px;padding-top:2px;}
  .lev.current{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);background:#FFF;}
  .lev.done .lst{color:var(--green);}
  .lev.locked{opacity:.45;cursor:not-allowed;filter:grayscale(.5);}
  .lev.locked:hover{transform:none;border-color:rgba(31,58,95,.35);}

  /* ---- stage ---- */
  .stage{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;min-height:0;
    background:var(--parchment);border-radius:6px;overflow:hidden;border:1px solid rgba(31,58,95,.3);position:relative;}
  .banner{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 14px;
    background:linear-gradient(180deg,var(--cream),var(--parchment));border-bottom:2px solid var(--gold);}
  .banner h2{font-size:17px;color:var(--navy);}
  .banner .bsub{font-size:12.5px;font-style:italic;font-family:var(--prose);color:var(--navy);opacity:.75;}
  .banner .spacer{flex:1;}
  .hud{display:flex;gap:8px;align-items:center;}
  .pill{background:var(--cream);border:1.5px solid var(--navy);border-radius:14px;padding:4px 11px;
    font-size:11.5px;font-weight:700;color:var(--navy);box-shadow:0 2px 0 rgba(31,58,95,.2);}
  .pill.warn{background:#FBF3DA;border-color:var(--gold-deep);color:var(--gold-deep);}
  .btn{font-family:var(--ui);font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;font-weight:700;
    padding:8px 14px;border-radius:5px;cursor:pointer;border:1.5px solid var(--navy);background:var(--navy);color:var(--cream);}
  .btn:hover{filter:brightness(1.15);}
  .btn.ghost{background:none;color:var(--navy);}

  /* ---- study panel (the worked example) ---- */
  .study{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;padding:12px 16px;overflow-y:auto;align-items:center;}
  .study.hidden{display:none;}
  .study .s-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;align-self:flex-start;}
  .study h3{font-size:19px;color:var(--navy);margin:1px 0 8px;align-self:flex-start;}
  .study img{max-width:100%;max-height:calc(100vh - 260px);width:auto;border:2px solid var(--navy);border-radius:6px;
    box-shadow:0 6px 18px rgba(22,40,63,.25);}
  .study .s-foot{margin-top:12px;display:flex;align-items:center;gap:14px;width:100%;}
  .study .s-note{flex:1 1 auto;font-family:var(--prose);font-style:italic;font-size:13.5px;line-height:1.5;color:var(--navy);opacity:.9;}

  /* ---- board ---- */
  .play{flex:1 1 auto;display:flex;flex-direction:column;min-height:0;}
  .play.hidden{display:none;}
  .board{flex:1 1 auto;position:relative;overflow:auto;padding:16px;display:flex;align-items:center;justify-content:center;}
  .grid{position:relative;}

  .tile{position:absolute;width:96px;height:112px;border-radius:7px;cursor:pointer;user-select:none;
    background:linear-gradient(180deg,#FDFBF3,#E8DCBF);
    border:1.5px solid #6E6349;
    box-shadow:2px 3px 0 #A8997A, 0 5px 10px rgba(22,40,63,.22);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 5px 5px;
    transition:transform .1s ease, box-shadow .1s ease, opacity .25s ease;}
  .tile:hover{transform:translate(-1px,-2px);box-shadow:3px 5px 0 #A8997A, 0 8px 14px rgba(22,40,63,.28);}
  .tile.sel{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold), 2px 3px 0 #A8997A;transform:translate(-1px,-2px);}
  .tile.blocked{cursor:not-allowed;filter:brightness(.82) saturate(.6);}
  .tile.blocked:hover{transform:none;box-shadow:2px 3px 0 #A8997A, 0 5px 10px rgba(22,40,63,.22);}
  .tile.gone{opacity:0;pointer-events:none;transform:scale(.6);}
  .tile.wrong{animation:shake .32s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
  .tile svg{width:60px;height:60px;}
  .tile .cap{font-family:var(--prose);font-size:11px;font-weight:700;color:var(--navy);text-align:center;line-height:1.15;}
  .tile.word{background:linear-gradient(180deg,#FBF3DA,#E5D3A2);}
  .tile.word .cap{font-size:13px;padding:0 2px;}
  .tile.word .sub{font-family:var(--ui);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep);}

  .foot{flex:0 0 auto;padding:9px 16px 12px;display:flex;align-items:center;gap:12px;border-top:2px solid var(--gold);
    background:linear-gradient(180deg,var(--parchment),var(--parchment-deep));}
  .msg{flex:1 1 auto;font-family:var(--prose);font-size:14px;line-height:1.45;color:var(--navy);min-height:20px;}
  .msg.good{color:var(--green);font-weight:600;}
  .msg.bad{color:var(--red);}

  /* ---- report ---- */
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(16,27,51,.72);display:none;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .report{width:min(640px,94vw);max-height:88vh;overflow-y:auto;background:var(--parchment);border:2px solid var(--gold);
    border-radius:9px;box-shadow:0 22px 60px rgba(0,0,0,.45);}
  .rep-head{padding:14px 18px;background:var(--navy);color:var(--cream);border-bottom:3px solid var(--gold);}
  .rep-head .eyebrow{font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:700;}
  .rep-head h3{font-size:21px;margin-top:2px;}
  .rep-body{padding:16px 18px;}
  .rep-body p{font-family:var(--prose);font-size:15px;line-height:1.6;margin-bottom:10px;}
  .codebox{margin-top:12px;padding:12px 14px;border:2px solid var(--gold);border-radius:7px;
    background:linear-gradient(180deg,#FBF3DA,#EBD9A8);}
  .codebox .cb-eyebrow{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-deep);font-weight:700;}
  .codebox .cb-word{font-family:var(--prose);font-size:27px;font-weight:700;letter-spacing:.06em;color:var(--navy);margin-top:2px;}
  .codebox .cb-note{font-family:var(--prose);font-size:12px;font-style:italic;opacity:.85;margin-top:3px;}
  .rep-actions{padding:0 18px 16px;display:flex;gap:9px;justify-content:flex-end;}

  /* ---- splash ---- */
  .splash{position:fixed;inset:0;z-index:200;background:#101B33;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:22px;transition:opacity .6s ease;}
  .splash.lift{opacity:0;pointer-events:none;}
  .splash h1{font-family:var(--prose);font-size:clamp(30px,6vw,58px);color:var(--cream);letter-spacing:.04em;}
  .splash h1 span{color:var(--gold);}
  .splash p{font-family:var(--prose);font-style:italic;font-size:16px;color:var(--band);opacity:.85;max-width:44ch;text-align:center;}
  .namebox{text-align:center;}
  .namebox label{display:block;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .namebox input{width:min(340px,80vw);padding:10px 13px;border-radius:5px;border:2px solid var(--gold);
    background:rgba(250,244,228,.95);color:var(--navy-ink);font-family:var(--prose);font-size:16px;outline:none;text-align:center;}
  .namebox input:focus{box-shadow:0 0 0 3px rgba(201,162,39,.45);}
  .splash .btn{padding:12px 26px;font-size:13px;}
</style>
</head>
<body>

<div class="splash" id="splash">
  <h1>Cine<span>Mahjong</span></h1>
  <p>Learn to read a shot. Study the director's tools, then match them until you know them by sight.</p>
  <div class="namebox">
    <label for="studentName">Your name</label>
    <input id="studentName" type="text" autocomplete="off" spellcheck="false" placeholder="so your completion code is yours alone">
  </div>
  <button class="btn" id="stepInside" type="button">Roll camera</button>
</div>

<header>
  <h1><span class="eq">EduQuest</span>CineMahjong</h1>
  <span class="sub">Reading the language of film.</span>
  <span class="spacer"></span>
  <button class="toggle" id="scholasticToggle" type="button">Scholastic Mode</button>
</header>

<main>
  <aside class="rail">
    <div class="rail-head">
      <span class="rh-badge">C</span>
      <span class="rh-name">Camera</span>
      <button class="teach" id="teachBtn" type="button" title="Unlock every level">Teacher</button>
    </div>
    <div class="levels" id="levelList"></div>
  </aside>

  <section class="stage">
    <div class="banner">
      <div>
        <h2 id="levTitle"></h2>
        <div class="bsub" id="levSub"></div>
      </div>
      <span class="spacer"></span>
      <div class="hud">
        <span class="pill" id="pairsPill"></span>
        <span class="pill warn" id="missPill"></span>
        <button class="btn ghost" id="studyBtn" type="button">Study</button>
        <button class="btn ghost" id="shuffleBtn" type="button">Reshuffle</button>
      </div>
    </div>

    <div class="study" id="studyPane">
      <div class="s-eyebrow">Study this first</div>
      <h3 id="studyTitle"></h3>
      <img id="studyImg" alt="">
      <div class="s-foot">
        <div class="s-note" id="studyNote"></div>
        <button class="btn" id="playBtn" type="button">Deal the tiles &#9656;</button>
      </div>
    </div>

    <div class="play hidden" id="playPane">
      <div class="board" id="board"><div class="grid" id="grid"></div></div>
      <div class="foot">
        <div class="msg" id="msg"></div>
        <button class="btn ghost" id="hintBtn" type="button">Nudge</button>
      </div>
    </div>
  </section>
</main>

<div class="overlay" id="overlay">
  <div class="report">
    <div class="rep-head">
      <div class="eyebrow" id="repEyebrow"></div>
      <h3 id="repTitle"></h3>
    </div>
    <div class="rep-body" id="repBody"></div>
    <div class="rep-actions">
      <button class="btn ghost" id="repAgain" type="button">Play it again</button>
      <button class="btn" id="repNext" type="button">Next level &#9656;</button>
    </div>
  </div>
</div>

<script>
/* ===================================================================
   CineMahjong
   A levelled matching activity: study the shot, then match the tiles.
   Tiles are SVG, so the whole activity stays tiny.
   =================================================================== */

/* ---------- the shots ---------- */
const SHOTS = {
  medium:   {name:'Medium Shot',       set:'sizes',    does:'Shows body language and some of the world around them.'},
  closeup:  {name:'Close Up',          set:'sizes',    does:'Puts us close to the face, and close to the feeling.'},
  extreme:  {name:'Extreme Close Up',  set:'sizes',    does:'Forces us to look at one small thing, and to feel the pressure of it.'},
  one:      {name:'One Shot',          set:'people',   does:'All the attention falls on a single character.'},
  two:      {name:'Two Shot',          set:'people',   does:'Holds two people in the frame, so we read the space between them.'},
  three:    {name:'Three Shot',        set:'people',   does:'Puts three in the frame, and a group has a dynamic a pair does not.'},
  crowd:    {name:'Crowd Shot',        set:'people',   does:'Shows scale, and makes the individual small inside it.'},
  establish:{name:'Establishing Shot', set:'concepts', does:'Tells us where we are and when, before anything else happens.'},
  ots:      {name:'Over the Shoulder', set:'concepts', does:'Puts us behind one character, seeing what they see.'},
  mise:     {name:'Mise en Sc\u00e8ne',set:'concepts', does:'Everything placed in the frame, telling us who lives here.'}
};

/* ---------- the levels ---------- */
const LEVELS = [
  {id:'C.1', name:'Shot Sizes',        sub:'how much we see',        shots:['medium','closeup','extreme'],
   poster:'sizes',    mode:'name', copies:2,
   note:'Three shots. How much of a person the camera lets us see, and how close that makes us feel. Study the poster, then match each picture to its name.'},

  {id:'C.2', name:'Adding People',     sub:'who is in the frame',    shots:['medium','closeup','extreme','one','two','three','crowd'],
   poster:'people',   mode:'name', copies:1,
   note:'The three shot sizes you already know, plus four new tiles about how many people share the frame. Seven in all.'},

  {id:'C.3', name:'Key Concepts',      sub:'three director\u2019s tools', shots:['establish','ots','mise'],
   poster:'concepts', mode:'name', copies:2,
   note:'Three concepts that do the heaviest work in any film: where we are, whose eyes we borrow, and what the room tells us.'},

  {id:'C.4', name:'The Full Deck',     sub:'everything, mixed',      shots:['medium','closeup','extreme','one','two','three','crowd','establish','ots','mise'],
   poster:null,       mode:'name', copies:1,
   note:'Every shot you have met. No poster this time. You already know these.'},

  {id:'C.5', name:'What a Shot Does',  sub:'effect, not name',       shots:['medium','closeup','extreme','one','two','three','crowd','establish','ots','mise'],
   poster:null,       mode:'effect', copies:1,
   note:'Now the hard turn. Match each shot not to its name, but to what it does to an audience. Naming a shot is not analysis. This is.'}
];

/* ---------- SVG tile art (drawn, not photographed: the whole file stays small) ---------- */
const FRAME = 'fill="none" stroke="#1F3A5F" stroke-width="1.6" stroke-dasharray="4 3"';
const INK = '#1F3A5F';
function art(k){
  const p = (d,w) => `<path d="${d}" fill="none" stroke="${INK}" stroke-width="${w||2}" stroke-linecap="round" stroke-linejoin="round"/>`;
  const person = (cx,cy,s) => `<circle cx="${cx}" cy="${cy-7*s}" r="${4.4*s}" fill="${INK}"/><path d="M${cx-5.4*s},${cy+11*s} v${-7*s} a${5.4*s},${5.4*s} 0 0 1 ${10.8*s},0 v${7*s} z" fill="${INK}"/>`;
  switch(k){
    case 'medium': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      <circle cx="32" cy="24" r="8" fill="${INK}"/><path d="M18,56 v-12 a14,14 0 0 1 28,0 v12 z" fill="${INK}"/></svg>`;
    case 'closeup': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      <circle cx="32" cy="27" r="14" fill="${INK}"/><path d="M14,56 v-4 a18,10 0 0 1 36,0 v4 z" fill="${INK}"/></svg>`;
    case 'extreme': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      ${p('M12,34 q20,-16 40,0 q-20,16 -40,0',2.4)}<circle cx="32" cy="34" r="7.5" fill="${INK}"/><circle cx="32" cy="34" r="3" fill="#FAF4E4"/>
      ${p('M14,22 q18,-8 36,0',2.2)}</svg>`;
    case 'one': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>${person(32,34,1.55)}</svg>`;
    case 'two': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>${person(22,34,1.25)}${person(42,34,1.25)}</svg>`;
    case 'three': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>${person(17,35,1.05)}${person(32,33,1.05)}${person(47,35,1.05)}</svg>`;
    case 'crowd': {
      let s='';
      const rows=[[14,26,5],[12,35,6],[14,44,5]];
      rows.forEach(([x0,y,n])=>{ for(let i=0;i<n;i++) s+=person(x0+i*7.6, y, .58); });
      return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>${s}</svg>`;
    }
    case 'establish': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      <path d="M10,48 h6 v-14 h5 v14 h4 v-20 h6 v20 h5 v-10 h5 v10 h4 v-16 h5 v16 h4" fill="${INK}"/>
      ${p('M10,52 h44',2)}<circle cx="45" cy="18" r="5" fill="none" stroke="${INK}" stroke-width="1.8"/>
      ${person(32,50,.5)}</svg>`;
    case 'ots': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      <circle cx="19" cy="28" r="10" fill="${INK}"/><path d="M4,56 v-8 a15,12 0 0 1 30,0 v8 z" fill="${INK}"/>
      <circle cx="45" cy="26" r="8" fill="none" stroke="${INK}" stroke-width="2.2"/>
      ${p('M35,52 v-4 a10,9 0 0 1 20,0 v4',2.2)}</svg>`;
    case 'mise': return `<svg viewBox="0 0 64 64"><rect x="6" y="8" width="52" height="48" rx="2" ${FRAME}/>
      ${p('M14,46 v-9 a5,5 0 0 1 10,0',2)}<path d="M11,30 l8,-6 l4,5 z" fill="${INK}"/>
      ${p('M14,46 h10',2.4)}
      <rect x="30" y="30" width="4" height="16" fill="${INK}"/><rect x="35" y="26" width="4" height="20" fill="${INK}"/><rect x="40" y="32" width="4" height="14" fill="${INK}"/>
      ${p('M48,46 v-6 q0,-6 4,-6 q4,0 4,6 v6',2)}
      ${p('M10,48 h46',2.2)}</svg>`;
  }
  return '<svg viewBox="0 0 64 64"></svg>';

  'MANATEE','LEMUR','IBEX','CARACAL','MARGAY','KAKAPO','ORYX','SERVAL','BONGO','ECHIDNA','NUMBAT','POTOROO','BILBY',
  'DUGONG','CIVET','FOSSA','SIFAKA','GERENUK','SAIGA','MARKHOR','TAKIN','BINTURONG','COATI','KINKAJOU','OLINGO',
  'TAYRA','JAGUARUNDI','ONCILLA','KODKOD','DHOLE','RATEL','ZORILLA','GRISON','LINSANG','GENET'];
const CODE_SALT = 'eduquest-cinemahjong-2026';
function codeHash(s){ let h=0x811c9dc5; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,0x01000193)>>>0; } return h>>>0; }
function makeCode(name, levelId){
  const clean = (name||'').toLowerCase().replace(/[^a-z]/g,'');
  if(!clean) return null;
  const h = codeHash(CODE_SALT+'|'+clean+'|'+levelId);
  return CODE_WORDS[h % CODE_WORDS.length] + '-' + (((h>>>8)%90)+10);
}
function studentName(){ try{ return localStorage.getItem('eq-student')||''; }catch(_){ return ''; } }
function setStudentName(n){ try{ localStorage.setItem('eq-student',n); }catch(_){} }

/* ---------- progress ---------- */
function progress(){ try{ return JSON.parse(localStorage.getItem('eq-cine')||'{}'); }catch(_){ return {}; } }
function setDone(id){ const p=progress(); p[id]=true; try{ localStorage.setItem('eq-cine',JSON.stringify(p)); }catch(_){} renderLevels(); }
let teacherMode=false, cur=0;
function unlocked(i){ return teacherMode || i===0 || !!progress()[LEVELS[i-1].id]; }

/* ---------- state ---------- */
let tiles=[], sel=[], matched=0, misses=0, total=0, busy=false;

const TW=96, TH=112, GX=12, GY=12, LAYER_DX=7, LAYER_DY=-7;

function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function buildDeck(){
  const L = LEVELS[cur];
  const deck = [];
  L.shots.forEach(k=>{
    for(let c=0;c<L.copies;c++){
      deck.push({key:k, face:'art'});
      deck.push({key:k, face:'word'});
    }
  });
  return shuffle(deck);
}

/* lay the tiles out in a staggered slab: two layers, the upper one offset,
   so some tiles are physically covered. That is the mahjong part. */
function layout(deck){
  const n = deck.length;
  const cols = Math.min(6, Math.ceil(Math.sqrt(n*1.35)));
  const placed = [];
  let i=0;
  // bottom layer takes most of the deck, top layer takes a covering few
  const topCount = Math.max(0, Math.floor(n*0.22));
  const botCount = n - topCount;
  const botCols = cols;
  const botRows = Math.ceil(botCount/botCols);
  for(let r=0;r<botRows && i<botCount;r++){
    for(let c=0;c<botCols && i<botCount;c++){
      placed.push({...deck[i], layer:0, r, c,
        x:c*(TW+GX), y:r*(TH+GY)});
      i++;
    }
  }
  // top layer sits over the middle of the slab
  const tCols = Math.max(1, Math.min(botCols-1, Math.ceil(Math.sqrt(topCount))));
  const tRows = Math.ceil(topCount/tCols);
  const offX = Math.floor((botCols - tCols)/2)*(TW+GX) + (TW+GX)/2;
  const offY = Math.floor(Math.max(0,(botRows - tRows))/2)*(TH+GY) + (TH+GY)/2;
  for(let r=0;r<tRows && i<n;r++){
    for(let c=0;c<tCols && i<n;c++){
      placed.push({...deck[i], layer:1, r, c,
        x:offX + c*(TW+GX) + LAYER_DX, y:offY + r*(TH+GY) + LAYER_DY});
      i++;
    }
  }
  return placed;
}

/* a tile is free if nothing sits on top of it and it has a clear left or right edge */
function isFree(t){
  if(t.gone) return false;
  const live = tiles.filter(x=>!x.gone);
  const covered = live.some(o => o!==t && o.layer > t.layer &&
    Math.abs(o.x - t.x) < TW*0.75 && Math.abs(o.y - t.y) < TH*0.75);
  if(covered) return false;
  const sameLayer = live.filter(o=>o!==t && o.layer===t.layer && Math.abs(o.y - t.y) < TH*0.5);
  const leftBlocked  = sameLayer.some(o=> Math.abs((o.x + TW + GX) - t.x) < 6);
  const rightBlocked = sameLayer.some(o=> Math.abs((t.x + TW + GX) - o.x) < 6);
  return !(leftBlocked && rightBlocked);
}

function faceHTML(t){
  const S = SHOTS[t.key];
  const L = LEVELS[cur];
  if(t.face==='art') return art(t.key) + `<span class="cap">&nbsp;</span>`;
  if(L.mode==='effect') return `<span class="sub">it does this</span><span class="cap">${S.does}</span>`;
  return `<span class="sub">the shot</span><span class="cap">${S.name}</span>`;
}

function render(){
  const g = document.getElementById('grid');
  const maxX = Math.max(...tiles.map(t=>t.x)) + TW;
  const maxY = Math.max(...tiles.map(t=>t.y)) + TH;
  g.style.width = maxX+'px'; g.style.height = maxY+'px';
  g.innerHTML = tiles.map((t,i)=>{
    const cls = ['tile'];
    if(t.face==='word') cls.push('word');
    if(t.gone) cls.push('gone');
    else if(!isFree(t)) cls.push('blocked');
    if(sel.includes(i)) cls.push('sel');
    return `<div class="${cls.join(' ')}" data-i="${i}" style="left:${t.x}px;top:${t.y}px;z-index:${t.layer*100 + t.r*2 + 5}">${faceHTML(t)}</div>`;
  }).join('');
  g.querySelectorAll('.tile').forEach(el=>el.addEventListener('click',()=>pick(+el.dataset.i)));
  updateHUD();
}

function updateHUD(){
  document.getElementById('pairsPill').textContent = `${matched} / ${total} pairs`;
  const m = document.getElementById('missPill');
  m.textContent = misses===0 ? 'clean run' : `${misses} miss${misses===1?'':'es'}`;
  m.style.display = 'inline-block';
}

function say(t, cls){
  const m = document.getElementById('msg');
  m.textContent = t || '';
  m.className = 'msg' + (cls ? ' '+cls : '');
}

function pick(i){
  if(busy) return;
  const t = tiles[i];
  if(!t || t.gone) return;
  if(!isFree(t)){ say('That tile is covered or hemmed in. Free it first.', 'bad'); return; }
  if(sel.includes(i)){ sel = sel.filter(x=>x!==i); render(); return; }
  sel.push(i);
  if(sel.length < 2){ render(); say(''); return; }

  const [a,b] = sel.map(x=>tiles[x]);
  // a pair is one art tile and one word tile of the SAME shot
  const good = a.key===b.key && a.face!==b.face;
  if(good){
    busy = true;
    render();
    setTimeout(()=>{
      a.gone = true; b.gone = true;
      matched++; sel=[]; busy=false;
      const S = SHOTS[a.key];
      say(`${S.name}. ${S.does}`, 'good');
      render();
      if(matched===total) win();
    }, 260);
  } else {
    misses++;
    busy = true;
    render();
    const els = sel.map(x=>document.querySelector(`.tile[data-i="${x}"]`));
    els.forEach(e=>e && e.classList.add('wrong'));
    const why = (a.key===b.key)
      ? 'Those are the same tile twice. Match the picture to its name, not to itself.'
      : 'Not a pair. Look again at what the camera is actually doing.';
    say(why, 'bad');
    setTimeout(()=>{ sel=[]; busy=false; render(); }, 420);
  }
}

function win(){
  const L = LEVELS[cur];
  setDone(L.id);
  const nm = studentName();
  const code = makeCode(nm, L.id);
  document.getElementById('repEyebrow').textContent = misses===0 ? 'A clean run' : 'Level complete';
  document.getElementById('repTitle').textContent = L.name;
  const clean = misses===0;
  document.getElementById('repBody').innerHTML =
    `<p>${clean
      ? 'Every pair, first time, no misses. You are not guessing any more. You are reading the frame.'
      : `You cleared the board with ${misses} miss${misses===1?'':'es'}. That is how it should feel: the shots that caught you out are the ones worth studying again.`}</p>` +
    `<p style="font-family:var(--ui);font-size:12.5px;opacity:.85">Shots in this level: ${L.shots.map(k=>SHOTS[k].name).join(' &middot; ')}</p>` +
    (code
      ? `<div class="codebox"><div class="cb-eyebrow">Completion code</div><div class="cb-word">${code}${clean?'':'*'}</div>
         <div class="cb-note">Write this down. It is generated from your name, so it will not work for anyone else.${clean?'' : ' The star means you needed more than one attempt at some tiles.'}</div></div>`
      : `<div class="codebox"><div class="cb-eyebrow">No completion code</div><div class="cb-note">You did not enter a name at the start, so there is nothing to record.</div></div>`);
  document.getElementById('repNext').style.display = (cur < LEVELS.length-1) ? 'inline-block' : 'none';
  document.getElementById('overlay').classList.add('show');
}

/* ---------- level flow ---------- */
function renderLevels(){
  const done = progress();
  document.getElementById('levelList').innerHTML = LEVELS.map((L,i)=>{
    const isDone = !!done[L.id], open = unlocked(i);
    const cls = ['lev'];
    if(i===cur) cls.push('current');
    if(isDone) cls.push('done');
    if(!open) cls.push('locked');
    const mark = isDone ? '&#10003;' : (open ? '' : '&#128274;');
    return `<button class="${cls.join(' ')}" data-i="${i}" type="button">
      <span class="lid">${L.id}</span>
      <span class="ltx"><span class="lname">${L.name}</span><span class="lsub">${L.sub}</span></span>
      <span class="lst">${mark}</span></button>`;
  }).join('');
  document.querySelectorAll('.lev').forEach(b=>b.addEventListener('click',()=>{
    const i = +b.dataset.i;
    if(!unlocked(i)) return;
    cur = i; loadLevel();
  }));
}

function loadLevel(){
  const L = LEVELS[cur];
  document.getElementById('levTitle').textContent = `${L.id} ${L.name}`;
  document.getElementById('levSub').textContent = L.sub;
  renderLevels();
  if(L.poster){
    const P = POSTERS[L.poster];
    document.getElementById('studyTitle').textContent = P.title;
    document.getElementById('studyImg').src = 'data:image/jpeg;base64,'+P.img;
    document.getElementById('studyNote').textContent = L.note;
    showStudy();
    document.getElementById('studyBtn').style.display='inline-block';
  } else {
    document.getElementById('studyBtn').style.display='none';
    deal();
  }
}
function showStudy(){
  document.getElementById('studyPane').classList.remove('hidden');
  document.getElementById('playPane').classList.add('hidden');
}
function deal(){
  const L = LEVELS[cur];
  tiles = layout(buildDeck());
  total = L.shots.length * L.copies;
  matched = 0; misses = 0; sel = []; busy = false;
  document.getElementById('studyPane').classList.add('hidden');
  document.getElementById('playPane').classList.remove('hidden');
  say(L.mode==='effect'
    ? 'Match each picture to what that shot DOES, not to its name.'
    : 'Match each picture to the name of the shot.');
  render();
}

document.getElementById('playBtn').addEventListener('click', deal);
document.getElementById('studyBtn').addEventListener('click', showStudy);
document.getElementById('shuffleBtn').addEventListener('click', ()=>{
  // reshuffle only the tiles still in play, so progress is kept
  const live = tiles.filter(t=>!t.gone).map(t=>({key:t.key, face:t.face}));
  tiles = layout(shuffle(live));
  sel=[]; render(); say('Reshuffled. Same tiles, new arrangement.');
});
document.getElementById('hintBtn').addEventListener('click', ()=>{
  const live = tiles.map((t,i)=>({t,i})).filter(o=>!o.t.gone && isFree(o.t));
  for(const a of live) for(const b of live){
    if(a.i!==b.i && a.t.key===b.t.key && a.t.face!==b.t.face){
      say(`Look for the ${SHOTS[a.t.key].name}. Two of its tiles are free right now.`);
      return;
    }
  }
  say('Nothing free matches. Reshuffle.', 'bad');
});
document.getElementById('repAgain').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('show'); deal();
});
document.getElementById('repNext').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.remove('show');
  if(cur < LEVELS.length-1){ cur++; loadLevel(); }
});
document.getElementById('teachBtn').addEventListener('click', ()=>{
  teacherMode = !teacherMode;
  document.getElementById('teachBtn').classList.toggle('on', teacherMode);
  renderLevels();
});
document.getElementById('stepInside').addEventListener('click', ()=>{
  const n = (document.getElementById('studentName').value||'').trim();
  if(n) setStudentName(n);
  document.getElementById('splash').classList.add('lift');
  setTimeout(()=>document.getElementById('splash').style.display='none', 650);
});
const togg = document.getElementById('scholasticToggle');
if(localStorage.getItem('eduquest-scholastic')==='1') document.body.classList.add('scholastic');
togg.addEventListener('click', ()=>{
  const on = document.body.classList.toggle('scholastic');
  localStorage.setItem('eduquest-scholastic', on?'1':'0');
});

/* ---------- boot ---------- */
document.getElementById('studentName').value = studentName();
renderLevels();
loadLevel();
</script>
</body>
</html>

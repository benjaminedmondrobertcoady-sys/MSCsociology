  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a521daed-7d3f-4174-9ec4-0f409d47ae7e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  @keyframes mgPop{0%{transform:scale(1);opacity:1}100%{transform:scale(.6);opacity:0}}\n  body{margin:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;padding:clamp(10px,2.5vw,26px);background:#0d1838;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.04) 0 3px,transparent 3px 6px),linear-gradient(180deg,#16275e,#0d1838);font-family:Georgia,'Times New Roman',serif;color:#2a2410;box-sizing:border-box;\">\n  <div style=\"max-width:1000px;margin:0 auto;background:#f3ead0;border:2px solid #9c7415;box-shadow:0 0 0 2px #13235e,0 12px 40px rgba(0,0,0,.6);\">\n\n    <div style=\"padding:clamp(16px,3vw,28px);border-bottom:4px solid #d8a93a;background:linear-gradient(180deg,#f7efd8,#efe3c0);\">\n      <div style=\"font-variant:small-caps;letter-spacing:.14em;font-weight:bold;font-size:.8rem;color:#256b3f;\">Film Studies · Cinematic Language<\u002Fdiv>\n      <img src=\"ededf145-a42a-4109-b2e2-451d3e2623c5\" alt=\"CineMahjong\" style=\"display:block;height:auto;width:min(430px,80%);margin:8px 0 2px -6px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.22));\">\n      <p style=\"margin:10px 0 0;max-width:66ch;font-size:.98rem;line-height:1.5;color:#3a3520;\">Clear the pile by matching each shot to its name. Tap a free <b>picture tile<\u002Fb>, then the <b>title card<\u002Fb> that names the technique — get it right and the pair lifts off the pile. No typing required.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"padding:clamp(14px,2.5vw,24px);\">\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px;\">\n        <div style=\"border:2px solid #2a2410;background:#fff;box-shadow:3px 3px 0 #2a2410;padding:8px 12px;font-weight:bold;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;\">Pairs left <span style=\"color:#6e1f35;\">{{ pairsLeft }}<\u002Fspan><\u002Fdiv>\n        <div style=\"border:2px solid #2a2410;background:#fff;box-shadow:3px 3px 0 #2a2410;padding:8px 12px;font-weight:bold;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;\">Matches <span style=\"color:#256b3f;\">{{ matches }}<\u002Fspan><\u002Fdiv>\n        <div style=\"border:2px solid #2a2410;background:#fff;box-shadow:3px 3px 0 #2a2410;padding:8px 12px;font-weight:bold;font-size:.76rem;letter-spacing:.04em;text-transform:uppercase;\">Wrong tries <span style=\"color:#9c7415;\">{{ wrongTries }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#256b3f,#1c5230);color:#fff;padding:7px 12px;font-variant:small-caps;font-weight:bold;letter-spacing:.06em;\">The Pile<\u002Fdiv>\n      <div style=\"background:{{ boardBg }};border:3px solid #2a1a0e;border-top:none;box-shadow:inset 0 0 46px rgba(0,0,0,.45),0 6px 18px rgba(0,0,0,.4);padding:clamp(10px,1.6vw,16px);overflow-x:auto;\">\n        <sc-if value=\"{{ notDealt }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;color:#f3ead0;padding:40px 16px;font-size:1.05rem;text-shadow:0 1px 3px rgba(0,0,0,.6);\">Press <b>New game<\u002Fb> to build the pile.<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ dealt }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:relative;margin:0 auto;width:{{ boardW }};height:{{ boardH }};\">\n            <sc-for list=\"{{ tiles }}\" as=\"tile\" hint-placeholder-count=\"20\">\n              <button type=\"button\" onclick=\"{{ tile.onClick }}\" aria-label=\"{{ tile.ariaLabel }}\" data-cid=\"{{ tile.cid }}\" data-kind=\"{{ tile.kind }}\" style=\"position:absolute;left:{{ tile.left }};top:{{ tile.top }};width:{{ tile.w }};height:{{ tile.h }};z-index:{{ tile.z }};padding:0;border:1px solid #b7a97e;background:linear-gradient(135deg,#fdfaf1 0%,#f4ecd7 55%,#ece1c4 100%);border-radius:8px 8px 10px 10px;transform:{{ tile.transform }};opacity:{{ tile.opacity }};box-shadow:{{ tile.shadow }};cursor:{{ tile.cursor }};pointer-events:{{ tile.pointer }};transition:transform .12s ease,opacity .35s ease;\">\n                <div style=\"position:absolute;left:0;right:0;top:0;height:38%;border-radius:8px 8px 0 0;background:linear-gradient(180deg,rgba(255,255,255,.6),rgba(255,255,255,0));pointer-events:none;\"><\u002Fdiv>\n                <sc-if value=\"{{ tile.isImage }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"position:absolute;inset:5px;border-radius:3px;overflow:hidden;background-color:#0b0b0d;background-image:{{ tile.bg }};background-size:cover;background-position:center;box-shadow:inset 0 0 0 1px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.35);\"><\u002Fdiv>\n                  <sc-if value=\"{{ tile.showHint }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"position:absolute;left:5px;right:5px;bottom:5px;background:rgba(19,35,94,.82);color:#f3ead0;font-size:.6rem;padding:2px 3px;text-align:center;font-family:Georgia,'Times New Roman',serif;\">{{ tile.label }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ tile.isText }}\" hint-placeholder-val=\"{{ false }}\">\n                  <span style=\"position:absolute;inset:5px;display:flex;align-items:center;justify-content:center;text-align:center;padding:1px 3px;color:#17402a;font-family:Georgia,'Times New Roman',serif;font-weight:bold;font-size:{{ tile.fontSize }};line-height:1.05;letter-spacing:.005em;text-shadow:0 1px 0 rgba(255,255,255,.6);overflow:hidden;overflow-wrap:break-word;word-break:normal;hyphens:manual;\">{{ tile.label }}<\u002Fspan>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ tile.matched }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:absolute;inset:0;border-radius:8px 8px 10px 10px;box-shadow:inset 0 0 0 3px #4fbf7a,0 0 14px rgba(79,191,122,.75);\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ tile.blocked }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"position:absolute;inset:0;border-radius:8px 8px 10px 10px;background:rgba(28,18,6,.34);\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ isWon }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:16px;border:3px solid #256b3f;background:#fff;box-shadow:5px 5px 0 #1c5230;padding:18px;\">\n          <div style=\"font-size:1.4rem;font-weight:bold;color:#256b3f;\">★ Pile cleared!<\u002Fdiv>\n          <p style=\"margin:6px 0 0;font-size:.95rem;color:#3a3520;\">You matched every shot in <i>The Merger<\u002Fi> to its name in {{ finalTries }} wrong tries. Deal a fresh board to play again.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;\">\n        <button type=\"button\" onclick=\"{{ onDeal }}\" style=\"background:#1b2f7a;color:#f3ead0;border:2px solid #13235e;padding:11px 20px;font-weight:bold;font-family:Georgia,'Times New Roman',serif;letter-spacing:.03em;box-shadow:3px 3px 0 rgba(0,0,0,.25);cursor:pointer;\">New game<\u002Fbutton>\n        <sc-if value=\"{{ dealt }}\" hint-placeholder-val=\"{{ true }}\">\n          <button type=\"button\" onclick=\"{{ onReshuffle }}\" style=\"background:#e8d9a7;color:#1b2f7a;border:2px solid;border-color:#fff #9c7415 #9c7415 #fff;padding:11px 18px;font-weight:bold;font-family:Georgia,'Times New Roman',serif;font-variant:small-caps;letter-spacing:.04em;cursor:pointer;\">↺ Reshuffle pile<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;boardSize&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Full&quot;,&quot;options&quot;:[&quot;Short&quot;,&quot;Standard&quot;,&quot;Full&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Game&quot;},&quot;easyMode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Game&quot;},&quot;woodTone&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Mahogany&quot;,&quot;options&quot;:[&quot;Walnut&quot;,&quot;Oak&quot;,&quot;Mahogany&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Look&quot;}}\">\nclass Component extends DCLogic {\n  // Each concept becomes two tiles: a picture frame and a title card.\n  // `img` files load by filename from the same folder (your repo).\n  // `imgs` (establishing shot) picks one of several frames at random each deal.\n  CONCEPTS = [\n    { label:'Close-Up',           img:'closeup.png' },\n    { label:'Extreme Close-Up',   img:'extremecloseup.png' },\n    { label:'Medium Shot',        img:'mediumshot.png' },\n    { label:'Two Shot',           img:'twoshot.png' },\n    { label:'Three Shot',         img:'threeshot.png' },\n    { label:'Over-the-Shoulder',  img:'overtheshoulder.png' },\n    { label:'High Angle',         img:'highangle.png' },\n    { label:'Low Angle',          img:'lowangle.png' },\n    { label:'Dutch Angle',        img:'dutchangle.png' },\n    { label:\"Bird's-Eye View\",    img:'birdseyeview.png' },\n    { label:'Mise-en-sc\\u00e8ne', img:'miseenscene.png' },\n    { label:'Establishing Shot',  imgs:['estshot1.png','estshot2.png','estshot3.png'] }\n  ];\n  // Woven-mat backgrounds a la Mahjong Titans: crosshatched weave over warm brown.\n  MAT = {\n    Walnut:'radial-gradient(ellipse at 50% 38%, rgba(255,225,180,.10), rgba(0,0,0,0) 62%),repeating-linear-gradient(45deg, rgba(0,0,0,.17) 0 5px, rgba(255,255,255,.05) 5px 10px),repeating-linear-gradient(-45deg, rgba(0,0,0,.15) 0 5px, rgba(255,255,255,.045) 5px 10px),linear-gradient(180deg,#5f3d22,#432a16)',\n    Oak:'radial-gradient(ellipse at 50% 38%, rgba(255,235,195,.12), rgba(0,0,0,0) 62%),repeating-linear-gradient(45deg, rgba(0,0,0,.14) 0 5px, rgba(255,255,255,.06) 5px 10px),repeating-linear-gradient(-45deg, rgba(0,0,0,.12) 0 5px, rgba(255,255,255,.05) 5px 10px),linear-gradient(180deg,#8a6236,#63451f)',\n    Mahogany:'radial-gradient(ellipse at 50% 38%, rgba(255,220,175,.11), rgba(0,0,0,0) 62%),repeating-linear-gradient(45deg, rgba(0,0,0,.18) 0 5px, rgba(255,255,255,.05) 5px 10px),repeating-linear-gradient(-45deg, rgba(0,0,0,.16) 0 5px, rgba(255,255,255,.045) 5px 10px),linear-gradient(180deg,#6f3a22,#4a2113)'\n  };\n  state = {\n    dealt:false, tiles:[], selected:[], matches:0, totalPairs:0, wrongTries:0,\n    phase:'idle', busy:false\n  };\n\n  componentDidMount(){ this.deal(); }\n\n  shuffle(a){ for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }\n\n  // Pairs of each normal concept. Establishing Shot scales with its 3 frames.\n  pairsPerConcept(){\n    const map = { Short:1, Standard:2, Full:4 };\n    return map[this.props.boardSize] || 4;\n  }\n\n  imgFor(concept){\n    if (concept.imgs && concept.imgs.length) return concept.imgs[Math.floor(Math.random()*concept.imgs.length)];\n    return concept.img || '';\n  }\n\n  // Build a stacked layout for exactly `count` tiles: a rectangular base on\n  // layer 0 with a smaller centered block raised on layer 1 for depth.\n  // Centered, multi-layer stepped pyramid (turtle-ish): a filled base with\n  // smaller centered blocks raised on top for depth.\n  buildLayout(count){\n    const cols0 = count <= 24 ? 6 : (count <= 34 ? 7 : (count <= 70 ? 8 : 10));\n    let l0 = Math.round(count * 0.56);\n    let l2 = count > 28 ? Math.round(count * 0.12) : 0;\n    let l1 = count - l0 - l2;\n    const pos = [];\n    const baseRows = Math.ceil(l0 / cols0);\n    const fill = (layer, n, cols) => {\n      const rows = Math.ceil(n / cols);\n      const sc = Math.floor((cols0 - cols) / 2);\n      const sr = Math.max(0, Math.round((baseRows - rows) / 2));\n      let placed = 0;\n      for (let r=0; r<rows && placed<n; r++){\n        for (let c=0; c<cols && placed<n; c++){ pos.push([layer, (layer===0?r:sr+r), (layer===0?c:sc+c)]); placed++; }\n      }\n    };\n    fill(0, l0, cols0);\n    if (l1 > 0) fill(1, l1, Math.max(2, cols0 - 2));\n    if (l2 > 0) fill(2, l2, Math.max(2, cols0 - 4));\n    return pos;\n  }\n\n  deal(){\n    const N = this.pairsPerConcept();\n    let tiles = []; let tid = 0;\n    const mk = (ci,kind,label,img)=>({ tid:tid++, cid:ci, kind, label, img:img||'', cleared:false, selected:false, matched:false });\n    this.CONCEPTS.forEach((concept, ci)=>{\n      if (concept.imgs && concept.imgs.length){\n        // e.g. Establishing Shot: each frame appears (N/2, min 1) times, names match the total.\n        const per = Math.max(1, Math.round(N/2));\n        let imgCount = 0;\n        concept.imgs.forEach((src)=>{ for (let k=0;k<per;k++){ tiles.push(mk(ci,'image',concept.label,src)); imgCount++; } });\n        for (let w=0; w<imgCount; w++) tiles.push(mk(ci,'text',concept.label,''));\n      } else {\n        for (let k=0;k<N;k++){\n          tiles.push(mk(ci,'image',concept.label,concept.img));\n          tiles.push(mk(ci,'text',concept.label,''));\n        }\n      }\n    });\n    this.shuffle(tiles);\n    const layout = this.buildLayout(tiles.length);\n    tiles.forEach((t,i)=>{ const p = layout[i] || [0,0,0]; t.layer=p[0]; t.row=p[1]; t.col=p[2]; });\n    this.setState({ dealt:true, tiles, selected:[], matches:0, totalPairs: tiles.length/2, wrongTries:0, phase:'play', busy:false });\n  }\n\n  occupied(tiles){\n    const occ = {};\n    tiles.forEach(t=>{ if (!t.cleared) occ[t.layer+','+t.row+','+t.col] = true; });\n    return occ;\n  }\n\n  freeWith(occ, t){\n    if (t.cleared) return false;\n    if (occ[(t.layer+1)+','+t.row+','+t.col]) return false;\n    const L = occ[t.layer+','+t.row+','+(t.col-1)];\n    const R = occ[t.layer+','+t.row+','+(t.col+1)];\n    return !(L && R);\n  }\n\n  tileClick(idx){\n    const st = this.state;\n    if (!st.dealt || st.phase==='won' || st.busy) return;\n    if (st.selected.length >= 2) return;\n    const t = st.tiles[idx];\n    if (!t || t.cleared || t.selected) return;\n    if (!this.freeWith(this.occupied(st.tiles), t)) return;\n    const tiles = st.tiles.map((x,i)=> i===idx ? Object.assign({}, x, {selected:true}) : x);\n    const selected = st.selected.concat(idx);\n    if (selected.length < 2){ this.setState({tiles, selected}); return; }\n    const a = selected[0], b = selected[1];\n    if (tiles[a].cid === tiles[b].cid && tiles[a].kind !== tiles[b].kind){\n      const flashed = tiles.map((x,i)=> (i===a||i===b) ? Object.assign({}, x, {matched:true}) : x);\n      this.setState({ tiles: flashed, selected, busy:true });\n      setTimeout(()=>{ this.setState(s=>{\n        const cleared = s.tiles.map((x,i)=> (i===a||i===b) ? Object.assign({}, x, {cleared:true, selected:false, matched:false}) : x);\n        const matches = s.matches + 1;\n        const won = matches >= s.totalPairs;\n        return { tiles: cleared, selected:[], matches, phase: won?'won':'play', busy:false };\n      }); }, 380);\n    } else {\n      this.setState({ tiles, selected, wrongTries: st.wrongTries+1, busy:true });\n      setTimeout(()=>{ this.setState(s=>({ tiles: s.tiles.map((x,i)=> (i===a||i===b) ? Object.assign({}, x, {selected:false}) : x), selected:[], busy:false })); }, 750);\n    }\n  }\n\n  reshuffle(){\n    const st = this.state;\n    if (!st.dealt || st.phase==='won') return;\n    const remaining = st.tiles.filter(t=>!t.cleared).map(t=>({ cid:t.cid, kind:t.kind, label:t.label, img:t.img }));\n    this.shuffle(remaining);\n    let k = 0;\n    const tiles = st.tiles.map(t=> t.cleared ? t : Object.assign({}, t, remaining[k++], { selected:false, matched:false }));\n    this.setState({ tiles, selected:[], phase:'play', busy:false });\n  }\n\n  renderVals(){\n    const st = this.state;\n    const n = st.tiles.length;\n    let tW, tH, GX, GY, pad, fs;\n    if (n > 70){ tW=70; tH=44; GX=5; GY=6; pad=12; fs='.47rem'; }\n    else if (n > 34){ tW=90; tH=52; GX=6; GY=8; pad=14; fs='.62rem'; }\n    else if (n > 24){ tW=108; tH=62; GX=7; GY=9; pad=16; fs='.72rem'; }\n    else { tW=116; tH=68; GX=8; GY=11; pad=14; fs='.9rem'; }\n    const LX = n>70?11:14, LY = n>70?13:16;\n    let maxRow = 0, maxCol = 0;\n    st.tiles.forEach(t=>{ if (t.row > maxRow) maxRow = t.row; if (t.col > maxCol) maxCol = t.col; });\n    const occ = this.occupied(st.tiles);\n    const hint = !!this.props.easyMode;\n    const tiles = st.tiles.map((t, idx)=>{\n      const free = this.freeWith(occ, t);\n      return {\n        key: String(t.tid),\n        cid: String(t.cid),\n        kind: t.kind,\n        onClick: ()=>this.tileClick(idx),\n        ariaLabel: t.cleared ? 'cleared tile' : (t.kind==='text' ? ('name tile: '+t.label) : 'picture tile') + (free ? ' (free)' : ' (blocked)'),\n        left: (pad + t.col*(tW+GX) - t.layer*LX) + 'px',\n        top: (pad + t.row*(tH+GY) - t.layer*LY) + 'px',\n        w: tW + 'px', h: tH + 'px',\n        z: String(t.layer*1000 + t.row*40 + t.col),\n        transform: t.selected ? 'translateY(-6px)' : 'none',\n        opacity: t.cleared ? '0' : '1',\n        pointer: (free && !t.cleared && st.phase==='play' && !st.busy) ? 'auto' : 'none',\n        cursor: free ? 'pointer' : 'default',\n        shadow: t.cleared ? 'none' : (t.selected\n          ? '0 0 0 3px #d8a93a,1px 1px 0 #efe7d0,2px 2px 0 #e7ddc0,3px 3px 0 #ddd1ae,4px 4px 0 #d3c69f,5px 5px 0 #c9bb90,0 12px 16px rgba(0,0,0,.55)'\n          : '1px 1px 0 #efe7d0,2px 2px 0 #e7ddc0,3px 3px 0 #ddd1ae,4px 4px 0 #d3c69f,5px 5px 0 #c9bb90,6px 8px 11px rgba(0,0,0,.5)'),\n        matched: t.matched,\n        blocked: (!free && !t.cleared && !t.matched),\n        isImage: t.kind === 'image',\n        isText: t.kind === 'text',\n        img: t.img,\n        bg: t.img ? ('url(\"' + t.img + '\")') : 'none',\n        label: t.label,\n        showHint: hint && t.kind === 'image' && !t.cleared,\n        fontSize: fs\n      };\n    });\n    return {\n      pairsLeft: st.totalPairs - st.matches,\n      matches: st.matches,\n      wrongTries: st.wrongTries,\n      finalTries: st.wrongTries,\n      boardBg: this.MAT[this.props.woodTone || 'Mahogany'] || this.MAT.Mahogany,\n      boardW: (pad*2 + maxCol*(tW+GX) + tW + 8) + 'px',\n      boardH: (pad*2 + maxRow*(tH+GY) + tH + 8) + 'px',\n      dealt: st.dealt, notDealt: !st.dealt,\n      tiles,\n      onDeal: ()=>this.deal(),\n      onReshuffle: ()=>this.reshuffle(),\n      isWon: st.phase === 'won'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>

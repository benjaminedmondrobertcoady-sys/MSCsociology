<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Restored | EduQuest</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --parchment:#F3E9CF; --parchment-deep:#EBDDB8; --cream:#FAF4E4; --band:#E4D3A6;
    --navy:#1F3A5F; --navy-ink:#16283F; --gold:#C9A227; --gold-deep:#A8841B;
    --green:#3E6B4F; --peri:#5B6ABF; --peri-deep:#3E4A96; --teal:#2E7F87; --violet:#6C4FA1;
    --red:#A63A32; --amber:#B07A1E; --pressure:#B5472F; --pressure-glow:#E0714A;
    --card-shadow: 0 3px 0 rgba(31,58,95,.18), 0 10px 24px rgba(31,58,95,.15);
    --ui: "Trebuchet MS", "Segoe UI", Verdana, sans-serif;
    --prose: Georgia, "Times New Roman", serif;
    --tile-paper: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAwICQsJCAwLCgsODQwOEh4UEhEREiUbHBYeLCcuLisnKyoxN0Y7MTRCNCorPVM+QkhKTk9OLztWXFVMW0ZNTkv/wAALCACgAKABAREA/8QAFgABAQEAAAAAAAAAAAAAAAAAAAEH/8QAFhABAQEAAAAAAAAAAAAAAAAAABEB/9oACAEBAAA/ANOEAAVFEUQUQAAUAABFQRQAUAARRAAAKoAIKIAAAAoACAAAKAAAgKIoigAIoIqAoigAAAgAoABoAAICgAACKAigAAAIoAAAAAIKAAAIoAAAAIoAAAAAABAAEFAAAAAEFRQAAAAQUAAAAAQBQAAAABBQAAAAAAABR//Z');
    --tile-news: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAwICQoJBwwKCQoNDAwOER0TERAQESMZGxUdKiUsKyklKCguNEI4LjE/MigoOk46P0RHSktKLTdRV1FIVkJJSkf/wAALCADIAMgBAREA/8QAFgABAQEAAAAAAAAAAAAAAAAAAAEH/8QAIBABAAICAwEBAQEBAAAAAAAAAAERMUEhYXGBsaFRkf/aAAgBAQAAPwDTQAARbNgAAAIoAAQCKFgE4AAAADs7AAQ2vZdCKWAAATAi5RT+E8AgoIoAigCLoNhoEFTaoXSk/wDAJCQsMAHHhZSaUsLEVMKAbDk9P6UAXGwksQDxQAAAEUoPoIfVQURT0AD0gPQRcJoXGyuwEFDQAWWAIohomLzEBsBUU0AcBRsBFBIDwFEFABF8NFHZujAIdAZVFAA4CSQMh+lnAIuRFRRFDIaoAJElTlFwnixR8EOw5UJAAD8ABDREVhQQFADYJEQv4BRBIIKkxwYUAAAOj4cAmFnkCi0Uv/SUVFCSQCTfBYYOywTkUkglNKBo8PAARRAU/CjSfFAPAIAxHACKJtU4UQOQUABUJIAA2IBs8X0AANmzYBwfRAUynJkAyoAFlACApKHIFAaBQAAAAQUAEFAEFAARQRQAf//Z');
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{font-family:var(--ui); background:var(--peri-deep); color:var(--navy-ink); display:flex; flex-direction:column; overflow:hidden;}
  body.scholastic, body.scholastic *{font-family:"DotGothic16", monospace !important;}

  header{flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:8px 16px;
    background:linear-gradient(105deg, var(--peri-deep) 0%, var(--peri) 55%, var(--violet) 100%);
    color:#F2EFFF; border-bottom:3px solid var(--gold);}
  header h1{font-size:19px; letter-spacing:.06em; font-weight:700;}
  header h1 .eq{opacity:.75; font-weight:400; font-size:13px; letter-spacing:.18em; text-transform:uppercase; margin-right:10px;}
  header .subtitle{font-size:12px; opacity:.9; font-style:italic; font-family:var(--prose);}
  header .spacer{flex:1;}
  .toggle{font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
    background:rgba(255,255,255,.12); color:#F2EFFF; border:1px solid rgba(255,255,255,.45); padding:5px 10px; border-radius:3px;}
  .toggle:hover, .toggle:focus-visible{background:rgba(255,255,255,.25); outline:2px solid var(--gold); outline-offset:1px;}

  main{flex:1 1 auto; display:flex; min-height:0; background:var(--peri-deep); padding:8px; gap:8px;}

  .rail{flex:0 0 118px; display:flex; flex-direction:column; gap:8px; padding:8px 6px;
    background:linear-gradient(180deg, var(--teal), var(--peri-deep)); border-radius:6px; border:1px solid rgba(255,255,255,.25);}
  .rail .rail-label{font-size:9px; letter-spacing:.22em; text-transform:uppercase; text-align:center; color:#EAF4F2; opacity:.9; padding-bottom:2px; border-bottom:1px solid rgba(255,255,255,.3);}
  .rail button{position:relative; cursor:pointer; text-align:left; background:var(--cream); border:2px solid rgba(31,58,95,.35); border-radius:6px; padding:8px 9px; transition:transform .15s ease, box-shadow .15s ease;}
  .rail button .case-ico{display:block; width:30px; height:30px; margin:0 auto 4px;}
  .rail button .case-name{display:block; text-align:center; font-size:11px; font-weight:700; color:var(--navy); line-height:1.15;}
  .rail button .case-tag{display:block; text-align:center; font-size:8.5px; color:var(--navy); opacity:.65; margin-top:1px; font-style:italic; font-family:var(--prose);}
  .rail button:hover{transform:translateX(2px);}
  .rail button.active{border-color:var(--gold); box-shadow:0 0 0 2px var(--gold); background:#FFF;}
  .rail button.soon{opacity:.5; cursor:default; filter:grayscale(.6);}
  .rail button.soon:hover{transform:none;}

  .stage{flex:1 1 auto; display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--parchment); border-radius:6px; overflow:hidden; border:1px solid rgba(31,58,95,.3);}
  .banner{flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:9px 16px; background:linear-gradient(180deg, var(--cream), var(--parchment)); border-bottom:2px solid var(--gold);}
  .banner h2{font-size:15px; color:var(--navy);}
  .banner .b-desc{font-size:12px; color:var(--navy-ink); font-family:var(--prose); line-height:1.4; margin-top:2px;}

  .work{flex:1 1 auto; display:flex; min-height:0;}
  .field{flex:1 1 auto; position:relative; min-height:0; background:var(--parchment-deep); overflow:hidden;}
  svg.diagram{width:100%; height:100%; display:block;}

  .qcol{flex:0 0 340px; display:flex; flex-direction:column; min-height:0; background:var(--cream); border-left:2px solid var(--gold);}
  .qcol-head{padding:10px 14px 8px; border-bottom:1px solid rgba(31,58,95,.2); background:var(--navy); color:var(--cream);}
  .qcol-head .step-num{font-size:10px; letter-spacing:.2em; text-transform:uppercase; opacity:.75;}
  .qcol-head .step-title{font-size:16px; font-weight:700; margin-top:1px;}
  .qcol-head .step-key{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin-top:2px;}
  .qcol-body{flex:1 1 auto; overflow-y:auto; padding:12px 14px;}
  .panel-q{font-size:13px; color:var(--navy-ink); font-family:var(--prose); line-height:1.5; margin-bottom:12px;}
  .options{display:flex; flex-direction:column; gap:7px;}
  .opt{text-align:left; cursor:pointer; background:var(--parchment); border:1.5px solid rgba(31,58,95,.4); border-radius:6px; padding:9px 11px; font-size:12.5px; color:var(--navy-ink); line-height:1.35; transition:border-color .15s ease, background .15s ease, transform .1s ease;}
  .opt:hover{border-color:var(--navy); transform:translateX(2px);}
  .opt.chosen{background:#EAF0E4; border-color:var(--green); border-width:2px;}
  .opt.chosen::before{content:"\2713  "; color:var(--green); font-weight:700;}
  .opt.reveal-correct{border-color:var(--green); background:#EAF0E4;}
  .opt.reveal-wrong{border-color:var(--red); background:#F5E3E1;}
  .opt.reveal-missed{border-color:var(--gold-deep); background:#FBF3DA; border-style:dashed;}
  .opt .opt-why{display:block; font-size:11px; font-style:italic; font-family:var(--prose); margin-top:4px; opacity:.85;}
  .qcol-foot{flex:0 0 auto; padding:10px 14px; border-top:1px solid rgba(31,58,95,.2); background:var(--parchment);}
  .feedback{font-size:12px; font-family:var(--prose); font-style:italic; color:var(--navy); min-height:34px; line-height:1.4; margin-bottom:8px;}
  .feedback.miss{color:var(--red); font-style:normal;}
  .feedback.hit{color:var(--green); font-style:normal;}
  .foot-btns{display:flex; gap:8px; justify-content:flex-end;}
  .btn{font-family:var(--ui); font-size:11px; letter-spacing:.1em; text-transform:uppercase; font-weight:700; padding:9px 16px; border-radius:5px; cursor:pointer; border:1.5px solid var(--navy); background:var(--navy); color:var(--cream); transition:filter .15s ease;}
  .btn:hover{filter:brightness(1.15);}
  .btn.ghost{background:none; color:var(--navy);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  .recap{position:absolute; z-index:25; width:210px; pointer-events:none; background:var(--navy); color:var(--cream); border:1px solid var(--gold); border-radius:5px; padding:8px 10px; font-family:var(--prose); font-size:11.5px; line-height:1.45; opacity:0; transition:opacity .12s ease;}
  .recap.show{opacity:1;}
  .recap .r-key{font-family:var(--ui); font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--gold); margin-bottom:3px;}

  /* floating Encarta-style article window */
  .article-btn{margin-left:auto; flex:0 0 auto;}
  .artwin{
    position:absolute; z-index:35; left:40px; top:40px; width:340px; height:360px;
    background:var(--cream); border:1.5px solid var(--navy); border-radius:6px;
    box-shadow:0 12px 34px rgba(22,40,63,.4); display:none; flex-direction:column; overflow:hidden;
  }
  .artwin.show{display:flex;}
  .artwin.collapsed{height:auto !important;}
  .artwin.collapsed .artwin-body, .artwin.collapsed .artwin-resize{display:none;}
  .artwin-bar{
    flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:6px 8px 6px 12px;
    background:linear-gradient(180deg, var(--peri), var(--peri-deep)); color:#F2EFFF; cursor:move; user-select:none;
  }
  .artwin-title{font-size:12px; font-weight:700; letter-spacing:.04em; flex:1 1 auto;}
  .artwin-controls{display:flex; gap:4px; flex:0 0 auto;}
  .artwin-btn{
    width:20px; height:18px; border:1px solid rgba(255,255,255,.5); background:rgba(255,255,255,.15);
    color:#F2EFFF; border-radius:3px; cursor:pointer; font-size:13px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .artwin-btn:hover{background:rgba(255,255,255,.3);}
  .artwin-body{flex:1 1 auto; overflow-y:auto; padding:12px 14px; background:var(--cream); position:relative;}
  .artwin-body::before{content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background-image:var(--tile-news); background-size:200px; opacity:.55; mix-blend-mode:multiply;}
  .artwin-body > *{position:relative; z-index:1;}
  .artwin-body .art-masthead{text-align:center; border-bottom:2px solid var(--navy); padding-bottom:5px; margin-bottom:9px;}
  .artwin-body .art-masthead .paper{font-family:var(--prose); font-size:15px; font-weight:700; letter-spacing:.04em; color:var(--navy); font-variant:small-caps;}
  .artwin-body .art-masthead .dateline{font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--navy); opacity:.6; margin-top:1px;}
  .artwin-body .art-headline{font-family:var(--prose); font-size:16px; font-weight:700; line-height:1.25; color:var(--navy-ink); margin-bottom:8px;}
  .artwin-body .art-figure{margin:0 0 10px;}
  .artwin-body .art-figure img{width:100%; display:block; border:1px solid var(--navy); filter:contrast(1.05);}
  .artwin-body .art-figure figcaption{font-family:var(--prose); font-style:italic; font-size:10.5px; color:var(--navy); opacity:.75; padding:4px 2px 0; line-height:1.35; border-bottom:1px solid rgba(31,58,95,.25); margin-bottom:2px;}
  .artwin-body .art-p{font-family:var(--prose); font-size:12.5px; line-height:1.55; color:var(--navy-ink); margin-bottom:8px; text-align:justify;}
  .artwin-body .art-p:first-of-type::first-letter{font-size:26px; font-weight:700; float:left; line-height:.9; padding:2px 5px 0 0; color:var(--navy);}
  .artwin-resize{position:absolute; right:0; bottom:0; width:16px; height:16px; cursor:nwse-resize;
    background:linear-gradient(135deg, transparent 50%, var(--navy) 50%, var(--navy) 60%, transparent 60%, transparent 72%, var(--navy) 72%, var(--navy) 82%, transparent 82%); opacity:.5;}
  body.scholastic .artwin-body *{font-family:"DotGothic16", monospace !important;}

  .overlay{position:absolute; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:rgba(31,58,95,.45); padding:20px;}
  .overlay.show{display:flex;}
  .report{width:min(560px,94%); max-height:92%; overflow:auto; background:var(--cream); border:2px solid var(--navy); border-radius:6px; box-shadow:0 18px 50px rgba(22,40,63,.5);}
  .rep-head{background:linear-gradient(105deg, var(--peri-deep), var(--violet)); color:#F2EFFF; padding:14px 18px; border-bottom:3px solid var(--gold);}
  .rep-head .eyebrow{font-size:10px; letter-spacing:.24em; text-transform:uppercase; opacity:.8;}
  .rep-head h2{font-size:21px; margin-top:2px;}
  .rep-body{padding:16px 18px 18px;}
  .rep-body .verdict{font-family:var(--prose); font-size:15px; line-height:1.55; margin-bottom:14px;}
  .durkheim{border:1.5px solid var(--gold); background:#FBF3DA; border-radius:6px; padding:12px 14px; margin-bottom:12px;}
  .durkheim .who{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .durkheim .who .badge{width:30px; height:30px; border-radius:50%; background:var(--navy); color:var(--cream); display:flex; align-items:center; justify-content:center; font-family:var(--prose); font-style:italic; font-size:15px; flex:0 0 auto;}
  .durkheim .who .name{font-size:12px; font-weight:700; color:var(--navy);}
  .durkheim .who .name span{display:block; font-weight:400; font-style:italic; opacity:.7; font-size:10px;}
  .durkheim p{font-family:var(--prose); font-size:13px; line-height:1.55; color:var(--navy-ink); margin-bottom:8px;}
  .durkheim p:last-child{margin-bottom:0;}
  .durkheim strong{color:var(--gold-deep);}
  .rep-actions{display:flex; gap:10px; justify-content:flex-end; margin-top:6px;}

  /* diagram SVG styling */
  .fband{fill:var(--band); stroke:var(--gold-deep); stroke-width:1; stroke-opacity:.4;}
  .fbandshadow{fill:rgba(31,58,95,.10);}
  .fband-label{font-size:15px; font-weight:700; fill:var(--gold-deep); font-family:var(--ui); letter-spacing:.06em; text-transform:uppercase; opacity:.8;}
  .fband-sub{font-size:9.5px; fill:var(--navy); opacity:.55; font-style:italic; font-family:var(--prose);}
  .normline{stroke:var(--navy); stroke-width:3;}
  .norm-plate{fill:var(--navy); stroke:var(--gold); stroke-width:1.5;}
  .norm-plate-title{fill:var(--gold); font-size:10px; font-weight:700; letter-spacing:.14em; font-family:var(--ui);}
  .norm-plate-sub{fill:var(--cream); font-size:9px; font-family:var(--prose); font-style:italic;}
  .normline-new{fill:var(--green); font-size:10px; font-family:var(--ui); font-weight:700; letter-spacing:.06em;}
  .deviance-rake{stroke:var(--red); stroke-width:2; stroke-dasharray:4 3; stroke-opacity:.7;}
  .dev-mark{fill:var(--red); stroke:var(--navy); stroke-width:1.4;}
  .dev-label{font-size:10px; font-weight:700; fill:var(--red); text-anchor:middle; font-family:var(--ui); letter-spacing:.04em;}
  .dev-sub{font-size:9px; fill:var(--navy); text-anchor:middle; font-style:italic; font-family:var(--prose);}
  .arc-path{fill:none; stroke:var(--navy); stroke-width:2; stroke-opacity:.22; stroke-dasharray:5 5;}
  .arc-live{fill:none; stroke:var(--pressure); stroke-width:4; stroke-linecap:round; filter:drop-shadow(0 0 3px rgba(224,113,74,.5));}
  .arc-node{cursor:default;}
  .arc-node.current{cursor:pointer;}
  .arc-node .node-ring{fill:var(--cream); stroke:var(--navy); stroke-width:2;}
  .arc-node.done .node-ring{fill:var(--pressure); stroke:var(--pressure); cursor:help;}
  .arc-node.current .node-ring{stroke:var(--gold); stroke-width:3;}
  .arc-node.locked .node-ring{fill:var(--parchment-deep); stroke-opacity:.4;}
  .arc-node .node-num{font-size:13px; font-weight:700; fill:var(--navy); text-anchor:middle; dominant-baseline:central; font-family:var(--ui);}
  .arc-node.done .node-num{fill:var(--cream);}
  .arc-node .station-tag rect{fill:var(--cream); stroke:var(--navy); stroke-width:1.5;}
  .arc-node.done .station-tag rect{fill:var(--pressure); stroke:var(--pressure);}
  .arc-node.current .station-tag rect{stroke:var(--gold); stroke-width:2;}
  .arc-node .tag-title{fill:var(--navy); font-size:11px; font-weight:700; text-anchor:middle; font-family:var(--ui); letter-spacing:.03em;}
  .arc-node.done .tag-title{fill:var(--cream);}
  .arc-node .node-key{fill:var(--navy); opacity:.55; font-size:8.5px; text-anchor:middle; font-family:var(--ui); letter-spacing:.14em; text-transform:uppercase;}
  .arc-node .node-pulse{fill:none; stroke:var(--gold); stroke-width:2; opacity:0;}
  .arc-node.current .node-pulse{animation:nodepulse 1.7s ease-out infinite;}
  @keyframes nodepulse{0%{transform:scale(1);opacity:.8;}100%{transform:scale(2);opacity:0;}}
  .wave-label{font-size:9px; fill:var(--navy); opacity:.6; font-family:var(--ui); letter-spacing:.14em; text-transform:uppercase;}
  .wave-base{fill:none; stroke:var(--navy); stroke-width:1; stroke-opacity:.25; stroke-dasharray:3 3;}
  .wave-live{fill:none; stroke:var(--pressure-glow); stroke-width:2.5; stroke-linecap:round; opacity:.85;}
  @media (prefers-reduced-motion: reduce){ .arc-node.current .node-pulse{animation:none;} }

  @media (max-width:820px){ .rail{flex-basis:88px;} .qcol{flex-basis:280px;} }

  /* splash title card */
  .splash{position:fixed; inset:0; z-index:200; overflow:hidden; background:#101B33; transition:opacity .7s ease, transform .7s ease;}
  .splash-img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; object-position:center;}
  .splash-enter{position:absolute; inset:0; z-index:2; pointer-events:none;}
  .splash-enter .setsail-anchor{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(100vw,150vh); height:min(100vh,66.67vw); pointer-events:none;}
  .splash-enter .setsail{position:absolute; right:7%; bottom:12%; pointer-events:auto;}
  .setsail{display:inline-flex; align-items:center; gap:10px; cursor:pointer;
    font-family:"Trebuchet MS","Segoe UI",Verdana,sans-serif; font-size:clamp(14px,1.4vw,18px);
    letter-spacing:.14em; text-transform:uppercase; font-weight:700; color:#F4EBD0;
    background:rgba(201,162,39,.16); border:1.6px solid var(--gold); border-radius:5px; padding:12px 24px;
    box-shadow:0 0 0 0 rgba(201,162,39,.5); animation:sailpulse 2.8s ease-in-out infinite;
    transition:background .2s ease, transform .2s ease;}
  .setsail .door{display:inline-flex; color:var(--gold); transition:transform .4s ease;}
  .setsail:hover{background:rgba(201,162,39,.28);}
  .setsail:hover .door{transform:translateX(2px);}
  .setsail:active{transform:translateY(1px);}
  @keyframes sailpulse{0%,100%{box-shadow:0 0 0 0 rgba(201,162,39,.45);}50%{box-shadow:0 0 0 8px rgba(201,162,39,0);}}
  .splash.lift{opacity:0; transform:translateY(-3%); pointer-events:none;}
  body.scholastic .setsail{font-family:"DotGothic16", monospace !important;}
  @media (prefers-reduced-motion: reduce){ .setsail{animation:none;} .splash{transition:opacity .4s ease;} .splash.lift{transform:none;} }
</style>
</head>

      body:[
        'The comedy rock duo Tenacious D have cancelled the rest of their world tour after guitarist Kyle Gass made an on stage remark about the shooting of a political figure.',
        'At a Sydney concert, one day after a gunman opened fire at a rally and injured former United States president Donald Trump, Gass was handed a birthday cake on stage. Asked to make a wish as he blew out the candles, he said, "Don\u2019t miss Trump next time." The audience laughed, but a clip of the moment spread across social media within hours.',
        'The reaction was swift and near unanimous. Commentators from across the political spectrum condemned the remark, arguing that joking about an assassination attempt crossed a line no performer should cross. Many stressed that the objection was not about politics but about making light of violence.',
        'The consequences arrived quickly. Gass\u2019s talent agency, Greene Talent, dropped him as a client. Bandmate Jack Black issued a statement calling the comment "highly inappropriate" and announcing that all future creative plans for Tenacious D were on hold. The remaining dates of the tour were cancelled.',
        'Gass later issued a public apology, saying the comment was "highly inappropriate, dangerous and a terrible mistake." No legal action was taken. The punishment, such as it was, came entirely from the public, the industry and his own bandmate rather than from any court.'
      ]
    },
    steps:[
      {q:'Deviance affirms the values a society holds by showing what it will not tolerate. Which values did the reaction to Gass affirm? Choose only the ones the response actually stood up for.',
       options:[
         {t:'That political violence is never a joke', correct:true},
         {t:'That public figures carry responsibility for what they say', correct:true},
         {t:'That comedy should never be dark', correct:false, why:'Dark comedy is common and accepted. No shared value was defended here.'},
         {t:'That foreigners should stay silent on local politics', correct:false, why:'Tempting, but the reaction was about violence, not nationality.'}
       ]},
      {q:'A moral boundary is clarified by the punishment that follows the act. Which consequences actually landed, drawing the line for everyone watching? Read the record and choose the real punishments.',
       options:[
         {t:'The remaining world tour was cancelled', correct:true},
         {t:'Gass was dropped by his talent agency', correct:true},
         {t:'Gass issued a public apology', correct:true},
         {t:'Gass was arrested and charged', correct:false, why:'No. A joke, however ugly, was not a crime. The punishment was entirely social.'},
         {t:'The band was fined by the government', correct:false, why:'Invented. The state did not act. Informal social control did all the work.'}
       ]},
      {q:'Deviance unifies people by drawing them together in a shared response. Who united against Gass, and where did that shared response gather? Choose the groups and forums that formed the consensus.',
       options:[
         {t:'A viral clip shared across X and Instagram', correct:true},
         {t:'Commentators and news outlets condemning the remark', correct:true},
         {t:'Fans and the public pressuring his management', correct:true},
         {t:'A street protest through Sydney', correct:false, why:'No march formed. The consensus was online and institutional, not on the pavement.'},
         {t:'A quiet post on Bluesky', correct:false, why:'Real, but peripheral. The consensus did not gather here.'}
       ]},
      {q:'Deviance can drive change by breaking a norm that is no longer shared. Did this act change the norm, or reassert it? Choose the outcome the evidence supports.',
       options:[
         {t:'The norm held: joking about political violence is still off limits, now more clearly than before', correct:true},
         {t:'The norm changed: society decided such jokes are acceptable', correct:false, why:'The opposite happened. The reaction reinforced the norm, it did not overturn it.'},
         {t:'A brand new norm about birthday candles was created', correct:false, why:'No norm was created. An existing one was reasserted.'}
       ]}
    ],
    reveal:{title:'The norm holds, louder than before.',
      verdict:'Gass broke a rule most people never think about until it is broken. Within two days the tour was gone, his agency had dropped him, and he had apologised in public. No court, no police: the reaction did all of it.',
      durkheim:[
        'You have just walked the four functions of deviance. Watch what they did together.',
        'The reaction <strong>affirmed</strong> the value that political violence is no joke, <strong>clarified</strong> the boundary through real punishment, and <strong>unified</strong> strangers into a single condemning public. On this occasion there was no <strong>change</strong>: the norm was reasserted, and now sits clearer than before.',
        'Notice who reacted. Not society in the abstract, but a particular, motivated, well amplified public. In my day the reaction gathered in the village square. Today it gathers in the feed.'
      ]}
  },
  kyrgios:{

    normSub:'players wear all white and respect Wimbledon tradition', deviance:'The red cap', newNorm:false,

      body:[
        'Nick Kyrgios has drawn criticism for breaking Wimbledon\u2019s strict all white dress code during and after the men\u2019s singles final, in what one commentator called a "final act of defiance."',
        'Wimbledon is the only Grand Slam tournament to enforce an almost total all white rule on player clothing, a tradition dating back well over a century. Kyrgios, who lost the final in four sets, walked out afterwards wearing a red cap and red trainers to collect his runner up plate, and kept the red cap on when he was presented to the Duchess of Cambridge.',
        'Tennis journalists and commentators were quick to react. Writing on social media, reporter Todd Balym said Kyrgios should "show some respect" for the occasion and its traditions. Others defended the dress code as part of what makes Wimbledon distinct, and argued that players who compete there accept its rules.',
        'Officials confirmed Kyrgios would face a fine for the breach, the standard penalty for dress code violations. He was pressed on the matter in his post match media conference.',
        'Kyrgios was unrepentant. He suggested he liked to keep things interesting and that "any publicity is good publicity," making clear the disapproval did not trouble him. The all white rule remained firmly in place, unchanged by the episode.'
      ]
    },
    steps:[
      {q:'Deviance affirms the values a society holds. Which values did the reaction to Kyrgios affirm? Choose only the ones the response actually stood up for.',
       options:[
         {t:'That tradition and its rules deserve respect', correct:true},
         {t:'That an institution can set the terms inside its own walls', correct:true},
         {t:'That players must never wear colour anywhere', correct:false, why:'Colour is fine at most tournaments. The value was respect for Wimbledon\u2019s tradition, not colour itself.'},
         {t:'That tennis should be less popular', correct:false, why:'Nobody defended this. It is not a value in play.'}
       ]},
      {q:'A moral boundary is clarified by the punishment that follows. This is a milder case: what consequences actually landed on Kyrgios? Read the article and choose the real ones.',
       options:[
         {t:'He was warned he would receive a fine', correct:true},
         {t:'He was publicly scolded by journalists and commentators', correct:true},
         {t:'He was pulled up by officials over the dress code', correct:true},
         {t:'He was banned from future tournaments', correct:false, why:'No ban. The punishment here was mild, a fine and public disapproval.'},
         {t:'He was stripped of his runner-up trophy', correct:false, why:'Invented. He kept the trophy. The sanction was small.'}
       ]},
      {q:'Deviance unifies people in a shared response. Who united against Kyrgios, and where? Choose the groups and forums that formed the consensus.',
       options:[
         {t:'Tennis journalists posting disapproval on Twitter', correct:true},
         {t:'Commentators defending Wimbledon\u2019s traditions', correct:true},
         {t:'A reporter pressing him in the media conference', correct:true},
         {t:'A boycott of the tournament by fans', correct:false, why:'No boycott formed. The consensus was media commentary, not organised action.'},
         {t:'The Duchess of Cambridge issuing a statement', correct:false, why:'She did not. The reaction came from press and public, not the royal.'}
       ]},
      {q:'Deviance can drive change, or reassert the norm. Kyrgios openly enjoyed the attention ("any publicity is good publicity"). Did the norm change or hold? Choose the outcome the evidence supports.',
       options:[
         {t:'The norm held: the dress code stands, and the reaction reaffirmed it', correct:true},
         {t:'The norm changed: Wimbledon dropped its all-white rule', correct:false, why:'It did not. The rule remains. The norm was reasserted.'},
         {t:'Kyrgios single-handedly ended the dress code', correct:false, why:'No change occurred. The tradition held firm.'}
       ]}
    ],
    reveal:{title:'The norm holds, with a shrug and a fine.',
      verdict:'A red cap will not end a career. Kyrgios drew a fine and a wave of tut-tutting, then wore his colours anyway. The punishment was mild, but the machinery was identical to the harsher cases.',
      durkheim:[
        'A gentler case, and all the more useful for it. The four functions still fired, just quietly.',
        'The reaction <strong>affirmed</strong> that tradition deserves respect, <strong>clarified</strong> the boundary with a small punishment, and <strong>unified</strong> the tennis press in shared disapproval. No <strong>change</strong>: the dress code held.',
        'But notice the twist. Kyrgios enjoyed the punishment. When the deviant welcomes the reaction, the machinery still runs, yet its grip loosens. Worth thinking about the next time a public figure seems to court the outrage.'
      ]}

      body:[
        'A technology company chief executive has resigned after a moment caught on a concert kiss cam spread rapidly across the internet.',
        'During a Coldplay concert, the stadium\u2019s big screen kiss cam settled on a man embracing a woman. Recognising themselves on screen, the pair quickly tried to hide their faces and duck out of view. The awkward reaction only drew more attention.',
        'Within hours the clip was circulating widely on TikTok and X. Viewers identified the man as the chief executive of a technology company, and the woman as a senior colleague. Reporting noted that the executive was married, and that the pair worked closely together, raising questions about both fidelity and the conduct expected of a company leader.',
        'The clip became a viral phenomenon, spawning memes, reaction videos and heavy coverage in both tabloid and business press. The couple were named and discussed across millions of posts.',
        'Shortly afterwards, the executive resigned from his company. No law had been broken and no court was involved. The entire punishment was delivered by the public, the platform and the press, a reminder of how much social force can gather around a single unguarded moment.'
      ]
    },
    steps:[
      {q:'Deviance affirms the values a society holds. Which values did the reaction affirm? Choose only the ones the response actually stood up for.',
       options:[
         {t:'That marriage and fidelity matter', correct:true},
         {t:'That leaders should not abuse power over junior colleagues', correct:true},
         {t:'That people should avoid live music', correct:false, why:'Not a value anyone defended. No consensus formed around it.'},
         {t:'That public affection is wrong', correct:false, why:'Public affection is normal. The rupture was the affair, not the affection.'}
       ]},
      {q:'A moral boundary is clarified by the punishment that follows. Which consequences actually landed? Choose the real punishments.',
       options:[
         {t:'The CEO resigned from his company', correct:true},
         {t:'The couple were publicly named and identified', correct:true},
         {t:'The moment became a permanent, viral punchline', correct:true},
         {t:'The CEO was jailed', correct:false, why:'No crime, no jail. Every consequence here was social, not legal.'},
         {t:'Coldplay were sued', correct:false, why:'Invented. The band did nothing wrong and faced no action.'}
       ]},
      {q:'Deviance unifies people in a shared response. Who united, and where? Choose the groups and forums that formed the consensus.',
       options:[
         {t:'The clip going viral on TikTok and X', correct:true},
         {t:'Memes, duets and reaction videos', correct:true},
         {t:'Coverage in tabloid and business press', correct:true},
         {t:'A formal complaint to the courts', correct:false, why:'An affair is not illegal. The courts had no role.'},
         {t:'A letter-writing campaign to Coldplay', correct:false, why:'The band was not the target, and no such campaign formed.'}
       ]},
      {q:'Deviance can drive change, or reassert the norm. Did the norm change or hold? Choose the outcome the evidence supports.',
       options:[
         {t:'The norm held: fidelity and the misuse of power are still condemned, now loudly', correct:true},
         {t:'The norm changed: society decided affairs are acceptable', correct:false, why:'The opposite. The reaction reinforced the norm.'},
         {t:'A new norm about kiss cams was created', correct:false, why:'No new norm. An existing one was reasserted.'}
       ]}
    ],
    reveal:{title:'The norm holds, louder than before.',
      verdict:'A three second shot on a concert screen cost a chief executive his job. No law was broken. The crowd, the platform and the press did the rest.',
      durkheim:[
        'Once more, watch what the reaction did rather than what it felt like.',
        'It <strong>affirmed</strong> the value of fidelity, <strong>clarified</strong> the boundary through a very public punishment, and <strong>unified</strong> millions of strangers in shared judgement. No <strong>change</strong>: the norm about faithfulness now sits louder than before.',
        'And again, ask who reacted. The people to whom this particular norm matters, amplified by a platform built to spread exactly this kind of moment.'
      ]}
  },

      body:[
        'The mayor of Maebashi, Akira Ogawa, resigned in November 2025 after weeks of controversy, then stood again in a snap election and was returned to office, an outcome that surprised many observers.',
        'The controversy began in September, when a magazine reported it had photographed Ogawa repeatedly visiting a roadside "love hotel", a short stay lodging, with a married man who worked under her at the city. Ogawa, the city\u2019s first female mayor and a political independent in a conservative region, held a press conference in response.',
        'She denied that there was any sexual relationship. The meetings, she said, were work discussions, and the venue was chosen because it was quiet and private. She acknowledged visiting the hotel with the man more than ten times, said she had paid the costs herself, and apologised for what she called her thoughtless actions and the concern they caused.',
        'The reaction was severe. Local media pursued the story, and the city assembly moved against her: factions prepared a no confidence motion and pressed her to quit. The pressure fell on both parties, but unevenly. The male subordinate left the city government, taking what was described as voluntary retirement. In November, Ogawa resigned.',
        'Then the twist. Ogawa announced she would run again in the resulting election. Campaigning on her record, including a free school lunch programme, and apologising once more for the scandal, she defeated four other candidates. She won close to 63,000 votes, about 10,000 more than her nearest rival, on a turnout well above the previous election.',
        'Commentators read the result as a sign that attitudes were shifting, that voters either disbelieved the affair or did not regard her private life as disqualifying. The reaction had followed the familiar pattern, but this time the community, at the ballot box, declined to enforce the punishment.'
      ]

         {t:'She resigned as mayor', correct:true},
         {t:'Her male subordinate left the city government', correct:true},
         {t:'She was arrested', correct:false, why:'No crime was alleged. The pressure was political and social, not legal.'},
         {t:'She was banned from ever standing for office again', correct:false, why:'The opposite. She was free to run again, and did.'}
       ]},
      {q:'Deviance unifies people in a shared response. Who united against the mayor, and where? Choose the groups and forums that formed the initial consensus.',
       options:[
         {t:'Magazines and local media pursuing the story', correct:true},
         {t:'The city assembly factions', correct:true},
         {t:'Public pressure calling for her to resign', correct:true},
         {t:'A national police investigation', correct:false, why:'No investigation. This was social and political pressure, not a legal process.'},
         {t:'The national government removing her', correct:false, why:'It did not. Local pressure, not national power, forced the resignation.'}
       ]},
      {q:'Deviance can drive change, or reassert the norm. This case ends differently from the others. What did the community ultimately decide? Choose the outcome the evidence supports.',
       options:[
         {t:'The norm was contested: voters returned her to office, declining to enforce the punishment', correct:true},
         {t:'The norm held firmly: she was permanently driven from public life', correct:false, why:'The opposite happened. She resigned, then won the election and returned to office.'},
         {t:'Nothing changed at all', correct:false, why:'Something did shift. A community that first demanded her resignation then voted her back in.'}
       ]}
    ],
    reveal:{title:'The norm bends. A new line is drawn.',
      verdict:'The reaction ran its usual course: exposure, condemnation, a resignation. And then the community did something the other cases never did. It voted her back in. The punishment was offered, and the public declined it.',
      durkheim:[
        'Here you see my fourth function doing real work. Deviance does not only reassert norms. Sometimes it reveals that a norm is no longer as shared as the loudest voices assumed.',
        'The reaction <strong>affirmed</strong> a value about leaders and private conduct, <strong>clarified</strong> it through pressure and resignation, and <strong>unified</strong> the assembly and the media against her. But at the final stop came <strong>change</strong>: the voters, asked directly, drew a new line. Either they disbelieved the story, or they judged it none of their business.',
        'Notice too who paid. The subordinate was pushed out; the mayor returned. When you study a reaction, always ask not only what norm was enforced, but on whom, and whether everyone truly agreed it should be.'
      ]}
  }
};

let currentKey='tenaciousd', activeCase=CASES[currentKey], stepIndex=0, chosen=new Set(), stepLocked=false, stepResults=[];
const svg=document.getElementById('diagram'), recap=document.getElementById('recap'), field=document.getElementById('field');

const GEO={W:760,H:500,lineY:250,bandTop:70,bandBot:200};
function stations(){ const xs=[190,330,470,610], ys=[150,118,118,150]; return xs.map((x,i)=>({x,y:ys[i]})); }
const DEV={x:95,y:150};
function END(){ return {x:690, y:activeCase.newNorm?GEO.lineY-64:GEO.lineY}; }
function fullPathPoints(){ return [DEV, ...stations(), END()]; }
function fullArcPath(){ const pts=fullPathPoints(); let d=`M${pts[0].x},${pts[0].y}`; for(let i=1;i<pts.length;i++){const p=pts[i-1],c=pts[i],cx=(p.x+c.x)/2; d+=` Q${cx},${p.y} ${cx},${(p.y+c.y)/2} T${c.x},${c.y}`;} return d; }
function livePathUpto(n){ const pts=fullPathPoints(); if(n<=0)return ''; let d=`M${pts[0].x},${pts[0].y}`; for(let i=1;i<=n;i++){const p=pts[i-1],c=pts[i],cx=(p.x+c.x)/2; d+=` Q${cx},${p.y} ${cx},${(p.y+c.y)/2} T${c.x},${c.y}`;} return d; }

function drawDiagram(){
  const S=stations(), end=END();
  const stationsSvg=S.map((p,i)=>{
    const m=STEP_META[i];
    const cls=i<stepIndex?'done':(i===stepIndex?'current':'locked');
    const num=i<stepIndex?'\u2713':(i+1);
    const below=p.y>135;
    return `<g class="arc-node ${cls}" data-step="${i}" transform="translate(${p.x},${p.y})">
      <circle class="node-pulse" r="17"></circle>
      <circle class="node-ring" r="16"></circle>
      <text class="node-num" y="1">${num}</text>
      <g class="station-tag" transform="translate(0,${below?34:-30})">
        <rect x="-54" y="-11" width="108" height="22" rx="11"></rect>
        <text class="tag-title" y="4">${m.title}</text>
      </g>
      <text class="node-key" y="${below?58:-40}">${m.key}</text>
    </g>`;
  }).join('');

  svg.innerHTML=`
    <rect class="fbandshadow" x="60" y="${GEO.bandTop+4}" width="640" height="${GEO.bandBot-GEO.bandTop}" rx="24"></rect>
    <rect class="fband" x="60" y="${GEO.bandTop}" width="640" height="${GEO.bandBot-GEO.bandTop}" rx="24"></rect>
    <text class="fband-label" x="76" y="${GEO.bandTop+22}">Functionalism</text>
    <text class="fband-sub" x="76" y="${GEO.bandTop+36}">the process that carries a broken norm back into place</text>

    <line class="normline" x1="40" y1="${GEO.lineY}" x2="720" y2="${GEO.lineY}"></line>
    <g class="norm-station" transform="translate(40,${GEO.lineY})">
      <rect class="norm-plate" x="0" y="-16" width="320" height="32" rx="16"></rect>
      <text class="norm-plate-title" x="14" y="-3">THE NORM</text>
      <text class="norm-plate-sub" x="14" y="9">${activeCase.normSub}</text>
    </g>
    ${activeCase.newNorm?`<line class="normline" x1="470" y1="${end.y}" x2="720" y2="${end.y}" stroke-dasharray="6 4"></line><text class="normline-new" x="470" y="${end.y-8}">a new norm</text>`:''}

    <line class="deviance-rake" x1="${DEV.x-16}" y1="${GEO.lineY}" x2="${DEV.x}" y2="${DEV.y+10}"></line>
    <g class="deviance-node" transform="translate(${DEV.x},${DEV.y})">
      <path class="dev-mark" d="M0,-12 L10,7 L-10,7 Z"></path>
      <text class="dev-label" y="-18">The deviant act</text>
      <text class="dev-sub" y="24">${activeCase.deviance}</text>
    </g>

    <path class="arc-path" d="${fullArcPath()}"></path>
    <path class="arc-live" id="arcLive" d=""></path>
    ${stationsSvg}

    <text class="wave-label" x="40" y="${GEO.H-58}">Social pressure</text>
    <path class="wave-base" d="M60,${GEO.H-30} H700"></path>
    <path class="wave-live" id="waveLive" d="M95,${GEO.H-30}"></path>
  `;
  const live=document.getElementById('arcLive');
  live.setAttribute('d',livePathUpto(stepIndex));
  live.style.strokeDasharray=''; live.style.strokeDashoffset='';
  drawWave(stepIndex);

  svg.querySelectorAll('.arc-node.current').forEach(n=>n.addEventListener('click',focusStep));
  svg.querySelectorAll('.arc-node.done').forEach(n=>{
    n.addEventListener('pointerenter',()=>showRecap(+n.dataset.step,n));
    n.addEventListener('pointerleave',hideRecap);
  });
}

function waveHeights(){ const base=GEO.H-30; return [base,base-24,base-52,base-74, activeCase.newNorm?base-40:base-18]; }
function drawWave(uptoStops){
  const wave=document.getElementById('waveLive'); if(!wave)return;
  const H=waveHeights(), xs=[95,190,330,470,660];
  let d=`M${xs[0]},${H[0]}`;
  for(let i=1;i<=uptoStops;i++){ const cx=(xs[i-1]+xs[i])/2; d+=` Q${cx},${H[i]} ${xs[i]},${H[i]}`; }
  wave.setAttribute('d',d);
}

function segTail(a,b){ const cx=(a.x+b.x)/2; return `Q${cx},${a.y} ${cx},${(a.y+b.y)/2} T${b.x},${b.y}`; }
function measure(d){ const t=document.createElementNS('http://www.w3.org/2000/svg','path'); t.setAttribute('d',d); svg.appendChild(t); const l=t.getTotalLength(); svg.removeChild(t); return l; }
function animateSegment(fromStop,success,cb){
  const pts=fullPathPoints(), a=pts[fromStop], b=pts[fromStop+1];
  const live=document.getElementById('arcLive');
  const basePath=livePathUpto(fromStop);
  const newD=(basePath?basePath+' ':'')+`M${a.x},${a.y} `+segTail(a,b);
  const full=measure(newD);
  const baseLen=basePath?measure(basePath):0;
  live.setAttribute('d',newD);
  const reach=success?full:baseLen+(full-baseLen)*0.6;
  live.style.transition='none';
  live.style.strokeDasharray=`${full} ${full}`;
  live.style.strokeDashoffset=`${full-baseLen}`;
  live.getBoundingClientRect();
  const dur=success?700:520;
  requestAnimationFrame(()=>{
    live.style.transition=`stroke-dashoffset ${dur}ms cubic-bezier(.35,0,.25,1)`;
    live.style.strokeDashoffset=`${full-reach}`;
  });
  if(success){
    setTimeout(()=>{ live.style.transition='none'; live.style.strokeDasharray=''; live.style.strokeDashoffset=''; live.setAttribute('d',livePathUpto(fromStop+1)); if(cb)cb(); },dur+40);
  } else {
    setTimeout(()=>{
      live.style.transition=`stroke-dashoffset 440ms cubic-bezier(.6,-0.4,.3,1.4)`;
      live.style.strokeDashoffset=`${full-baseLen}`;
      setTimeout(()=>{ live.style.transition='none'; live.setAttribute('d',livePathUpto(fromStop)); live.style.strokeDasharray=''; live.style.strokeDashoffset=''; if(cb)cb(); },460);
    },dur+140);
  }
}

function showRecap(i,node){
  const res=stepResults[i]; if(!res)return;
  const m=STEP_META[i];
  recap.innerHTML=`<div class="r-key">${m.title} \u00b7 ${m.key}</div>You identified: ${res.chosenText.join('; ')}. With this settled, functionalism moved on.`;
  const r=field.getBoundingClientRect(), box=node.getBoundingClientRect();
  let left=box.left-r.left+box.width/2-105;
  left=Math.max(6,Math.min(left,r.width-216));
  recap.style.left=left+'px'; recap.style.top=(box.bottom-r.top+8)+'px';
  recap.classList.add('show');
}
function hideRecap(){ recap.classList.remove('show'); }

function focusStep(){
  const st=activeCase.steps[stepIndex], m=STEP_META[stepIndex];
  chosen=new Set(); stepLocked=false;
  document.getElementById('stepNum').textContent=`Stop ${stepIndex+1} of 4`;
  document.getElementById('stepTitle').textContent=m.title;
  document.getElementById('stepKey').textContent=m.key;
  document.getElementById('panelQ').textContent=st.q;
  const fb=document.getElementById('feedback'); fb.textContent=''; fb.className='feedback';
  const submit=document.getElementById('submitBtn'); submit.textContent='Submit'; submit.disabled=false; submit.dataset.retry=''; submit.dataset.ready='';
  const opts=shuffle(st.options.map((o,idx)=>({...o,idx})));
  const wrap=document.getElementById('options');
  wrap.innerHTML=opts.map(o=>`<button class="opt" data-idx="${o.idx}" type="button">${o.t}</button>`).join('');
  wrap.querySelectorAll('.opt').forEach(b=>b.addEventListener('click',()=>{
    if(stepLocked)return;
    const idx=+b.dataset.idx;
    if(chosen.has(idx)){chosen.delete(idx);b.classList.remove('chosen');}
    else{chosen.add(idx);b.classList.add('chosen');}
  }));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function submitOrAdvance(){
  const submit=document.getElementById('submitBtn');
  if(submit.dataset.ready==='1'){ submit.dataset.ready=''; advance(); return; }
  if(submit.dataset.retry==='1'){ submit.dataset.retry=''; focusStep(); return; }
  gradeStep();
}
function gradeStep(){
  const st=activeCase.steps[stepIndex];
  let totalCorrect=0,correctPicked=0,wrongPicked=0;
  st.options.forEach((o,idx)=>{if(o.correct)totalCorrect++; if(chosen.has(idx)){o.correct?correctPicked++:wrongPicked++;}});
  const missed=totalCorrect-correctPicked, clean=wrongPicked===0&&missed===0;
  const fb=document.getElementById('feedback'), submit=document.getElementById('submitBtn');
  stepLocked=true; revealOptions(st);
  if(clean){
    fb.textContent='The current holds. Social pressure carries it to the next stop.'; fb.className='feedback hit';
    submit.textContent=stepIndex<3?'Next stop':'See the outcome';
    submit.dataset.retry=''; submit.dataset.ready='1';
    stepResults[stepIndex]={chosenText:st.options.filter((o,idx)=>chosen.has(idx)&&o.correct).map(o=>o.t.toLowerCase())};
    animateSegment(stepIndex,true,()=>drawWave(stepIndex+1));
  } else {
    let msg;
    if(wrongPicked&&missed)msg='The current falls short. One or more picks do not belong, and something is missing.';
    else if(wrongPicked)msg='The current falls short. A choice the reaction did not make has drained the pressure.';
    else msg='The current falls short. You have missed part of what the reaction formed around.';
    fb.textContent=msg; fb.className='feedback miss';
    submit.textContent='Try again'; submit.dataset.retry='1';
    animateSegment(stepIndex,false,null);
  }
}
function revealOptions(st){
  document.querySelectorAll('.opt').forEach(b=>{
    const idx=+b.dataset.idx,o=st.options[idx];
    b.classList.remove('chosen');
    if(o.correct&&chosen.has(idx))b.classList.add('reveal-correct');
    else if(!o.correct&&chosen.has(idx)){b.classList.add('reveal-wrong'); if(o.why)b.innerHTML+=`<span class="opt-why">${o.why}</span>`;}
    else if(o.correct&&!chosen.has(idx))b.classList.add('reveal-missed');
  });
}
function advance(){
  if(stepIndex<3){ stepIndex++; drawDiagram(); focusStep(); }
  else { setTimeout(showReport,400); }
}

function showReport(){
  const r=activeCase.reveal;
  document.getElementById('repEyebrow').textContent=activeCase.newNorm?'The norm shifts':'The norm holds';
  document.getElementById('repTitle').textContent=r.title;
  document.getElementById('repBody').innerHTML=
    `<p class="verdict">${r.verdict}</p>
     <div class="durkheim"><div class="who"><div class="badge">D</div><div class="name">Emile Durkheim<span>sociologist, 1858 to 1917</span></div></div>
     ${r.durkheim.map(p=>`<p>${p}</p>`).join('')}</div>
     <div class="rep-actions"><button class="btn ghost" id="repClose" type="button">Back to the diagram</button><button class="btn" id="repReset" type="button">Play it again</button></div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('repClose').onclick=()=>document.getElementById('overlay').classList.remove('show');
  document.getElementById('repReset').onclick=()=>{document.getElementById('overlay').classList.remove('show');resetCase();};
}

function resetCase(){ stepIndex=0; chosen=new Set(); stepLocked=false; stepResults=[]; drawDiagram(); focusStep(); }
function switchCase(key){
  if(key===currentKey)return;
  currentKey=key; activeCase=CASES[key];
  document.getElementById('caseTitle').textContent=activeCase.name;
  document.getElementById('caseDesc').textContent=activeCase.desc;
  document.getElementById('overlay').classList.remove('show');
  document.querySelectorAll('.rail-case').forEach(b=>b.classList.toggle('active',b.dataset.case===key));
  if(artwin.classList.contains('show')) fillArticle();
  resetCase();
}
document.querySelectorAll('.rail-case').forEach(b=>b.addEventListener('click',()=>switchCase(b.dataset.case)));
document.getElementById('submitBtn').addEventListener('click',submitOrAdvance);
document.getElementById('resetStepBtn').addEventListener('click',focusStep);

const togg=document.getElementById('scholasticToggle');
if(localStorage.getItem('eduquest-scholastic')==='1')document.body.classList.add('scholastic');
togg.addEventListener('click',()=>{const on=document.body.classList.toggle('scholastic');localStorage.setItem('eduquest-scholastic',on?'1':'0');});

/* ---------------- article window ---------------- */
const artwin=document.getElementById('artwin');
function fillArticle(){
  const a=activeCase.article;
  const body=document.getElementById('artwinBody');
  if(!a){ body.innerHTML='<div class="art-p">No article for this case yet.</div>'; return; }
  body.innerHTML=
    `<div class="art-masthead"><div class="paper">${a.byline}</div><div class="dateline">${a.dateline}</div></div>
     <div class="art-headline">${a.headline}</div>
     ${a.img?`<figure class="art-figure"><img src="${a.img}" alt="${a.caption||''}"><figcaption>${a.caption||''}</figcaption></figure>`:''}
     ${a.body.map(p=>`<div class="art-p">${p}</div>`).join('')}`;
  body.scrollTop=0;
}
function openArticle(){ fillArticle(); artwin.classList.add('show'); artwin.classList.remove('collapsed'); }
document.getElementById('articleBtn').addEventListener('click',()=>{
  if(artwin.classList.contains('show') && !artwin.classList.contains('collapsed')) artwin.classList.remove('show');
  else openArticle();
});
document.getElementById('artwinClose').addEventListener('click',()=>artwin.classList.remove('show'));
document.getElementById('artwinCollapse').addEventListener('click',()=>artwin.classList.toggle('collapsed'));

// drag by the title bar
(function(){
  const bar=document.getElementById('artwinBar');
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  bar.addEventListener('pointerdown',e=>{
    if(e.target.classList.contains('artwin-btn')) return;
    dragging=true; sx=e.clientX; sy=e.clientY;
    const r=artwin.getBoundingClientRect(), pr=field.getBoundingClientRect();
    ox=r.left-pr.left; oy=r.top-pr.top;
    bar.setPointerCapture(e.pointerId);
  });
  bar.addEventListener('pointermove',e=>{
    if(!dragging) return;
    const pr=field.getBoundingClientRect();
    let nx=ox+(e.clientX-sx), ny=oy+(e.clientY-sy);
    nx=Math.max(0,Math.min(nx,pr.width-60));
    ny=Math.max(0,Math.min(ny,pr.height-30));
    artwin.style.left=nx+'px'; artwin.style.top=ny+'px';
  });
  bar.addEventListener('pointerup',e=>{ dragging=false; try{bar.releasePointerCapture(e.pointerId);}catch(_){} });
})();

// resize from the corner
(function(){
  const handle=document.getElementById('artwinResize');
  let rz=false, sx=0, sy=0, sw=0, sh=0;
  handle.addEventListener('pointerdown',e=>{
    rz=true; sx=e.clientX; sy=e.clientY;
    const r=artwin.getBoundingClientRect(); sw=r.width; sh=r.height;
    handle.setPointerCapture(e.pointerId); e.stopPropagation();
  });
  handle.addEventListener('pointermove',e=>{
    if(!rz) return;
    artwin.style.width=Math.max(220,sw+(e.clientX-sx))+'px';
    artwin.style.height=Math.max(140,sh+(e.clientY-sy))+'px';
  });
  handle.addEventListener('pointerup',e=>{ rz=false; try{handle.releasePointerCapture(e.pointerId);}catch(_){} });
})();

function boot(){
  document.getElementById('caseTitle').textContent=activeCase.name;
  document.getElementById('caseDesc').textContent=activeCase.desc;
  drawDiagram(); focusStep();
}
boot();

/* splash */
(function(){
  const splash=document.getElementById('splash'), btn=document.getElementById('stepInside');
  if(!splash||!btn)return;
  btn.addEventListener('click',()=>{ splash.classList.add('lift'); setTimeout(()=>splash.remove(),800); });
})();
</script>
</body>
